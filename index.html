var DB = {

  loadConfig: async function(){
    var res = await sb.from("site_config").select("*");
    if(res.error || !res.data) return {};
    var cfg = {};
    res.data.forEach(function(r){ cfg[r.key] = r.value; });
    return cfg;
  },
  saveConfig: async function(key, value){
    await sb.from("site_config").upsert({key:key, value:String(value)});
  },
  saveConfigAll: async function(cfg){
    var rows = Object.keys(cfg).map(function(k){return {key:k, value:String(cfg[k])}});
    await sb.from("site_config").upsert(rows);
  },

  // --- Buildings ---
  loadBuildings: async function(){
    var res = await sb.from("buildings").select("*").order("sort_order");
    return res.data || [];
  },
  saveBuilding: async function(b){
    await sb.from("buildings").upsert(b);
  },
  deleteBuilding: async function(id){
    await sb.from("buildings").delete().eq("id", id);
  },

  // --- Units ---
  loadUnits: async function(buildingId){
    var q = sb.from("units").select("*").order("sort_order");
    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  loadAllUnits: async function(){

  },

  uploadFile: function(file, folder, callback, msgFn){
    if(msgFn) msgFn("☁️ Enviando...");
    var fileName = folder + "/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    sb.storage.from("arquivos").upload(fileName, file, {upsert:true}).then(function(res){
      if(res.error){if(msgFn) msgFn("Erro: "+res.error.message); return;}
      var publicUrl = SB_URL + "/storage/v1/object/public/arquivos/" + fileName;

    }).catch(function(e){if(msgFn) msgFn("Erro no upload"); console.log(e);});

  // ═══ HOME VIEW ═══
  function HomeView(){
    return(
      <div style={{padding:"20px clamp(14px, 4vw, 48px)"}}>
        <div className="au" style={{marginBottom:24}}>

                <div style={{position:"absolute",top:12,right:12,padding:"5px 12px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(0,0,0,0.5)",color:"#fff",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,0.08)",letterSpacing:.5}}>{b.tag}</div>
                {!b.active && adm && <div style={{position:"absolute",top:12,left:12,padding:"5px 12px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(213,91,91,0.8)",color:"#fff"}}>Oculto</div>}
                <div style={{position:"absolute",bottom:16,left:18,right:18}}>
                  <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,fontWeight:500,lineHeight:1.15,textShadow:"0 2px 12px rgba(0,0,0,0.6)"}}>{b.name}</div>
                </div>
              </div>
              <div style={{padding:"16px 18px 18px"}}>
                <div style={{fontSize:12,color:"#7A7570",marginBottom:12,lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{b.subtitle}</div>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{padding:"4px 10px",borderRadius:6,fontSize:10,fontWeight:600,background:b.status==="ready"?"rgba(76,175,125,0.08)":"rgba(232,169,78,0.08)",color:b.status==="ready"?"#4CAF7D":"#E8A94E"}}>{b.status==="ready"?"Pronto":"Obra "+b.construction_pct+"%"}</span>
                  </div>

  // ═══ DETAIL VIEW ═══
  function DetailView(){
    if(!bld) return null;
    var units = getUnits(bld.id);
    var photos = getPhotos(bld.id);
    var plants = getPlants(bld.id);
    var docs = getDocs(bld.id);
    var notices = getNotices(bld.id);
    var cover = getCover(bld.id);
    var filtered = filter==="all"?units:units.filter(function(u){return u.status===filter});

    return(
      <div style={{padding:"20px clamp(16px, 4vw, 48px)"}}>
        <button onClick={function(){setVw("home")}} style={{background:"none",border:"none",color:G,fontSize:12,fontWeight:600,cursor:"pointer",padding:"4px 0",marginBottom:8}}>← {t.back}</button>
        {cover && <div style={{height:200,borderRadius:14,overflow:"hidden",marginBottom:12,position:"relative",backgroundImage:"url("+cover+")",backgroundSize:"cover",backgroundPosition:"center"}}>
          <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 50%,rgba(0,0,0,0.7))"}}>
            <div style={{position:"absolute",bottom:10,left:12}}>
              <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:20,fontWeight:700,color:"#fff"}}>{bld.name}</div>
            </div>
          </div>
        </div>}
        {!cover && <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:26,fontWeight:500,color:bld.color,letterSpacing:"-0.02em",marginBottom:2}}>{bld.name}</div>}
        <div style={{fontSize:10,color:"#9A9590",marginBottom:10}}>{bld.subtitle}</div>
        <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:8,flexWrap:"wrap"}}>
          <span style={{padding:"2px 8px",borderRadius:5,fontSize:9,fontWeight:700,background:bld.status==="ready"?"rgba(76,175,125,0.1)":"rgba(232,169,78,0.1)",color:bld.status==="ready"?"#4CAF7D":"#E8A94E"}}>{bld.status==="ready"?t.ready:t.construction}</span>
          {bld.status==="construction" && <div style={{flex:1,height:4,background:"rgba(255,255,255,0.05)",borderRadius:2,overflow:"hidden",minWidth:60}}><div style={{height:"100%",width:bld.construction_pct+"%",background:bld.color,borderRadius:2}}/></div>}
          {bld.status==="construction" && <span style={{fontSize:9,fontWeight:700,color:"#E8A94E"}}>{bld.construction_pct}%</span>}
          <span style={{padding:"2px 8px",borderRadius:5,fontSize:9,fontWeight:600,background:bld.color+"12",color:bld.color}}>💰 {bld.commission||5}% {t.commission}</span>
          {bld.incorporation && <span style={{padding:"2px 8px",borderRadius:5,fontSize:9,fontWeight:600,background:"rgba(91,143,212,0.1)",color:"#5B8FD4"}}>📋 {bld.incorporation}</span>}
        </div>

        {adm && <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:10}}>
          <button onClick={function(){setMdl({t:"editBld",bid:bld.id})}} style={mbtn(bld.color)}>✏️ Editar</button>
          {bld.status==="construction" && <button onClick={function(){setMdl({t:"obra",bid:bld.id})}} style={mbtn("#E8A94E")}>🏗️ Obra</button>}
          <button onClick={function(){setMdl({t:"notice",bid:bld.id})}} style={mbtn("#8B6FBF")}>📢 Aviso</button>
          <button onClick={function(){setMdl({t:"addUnit",bid:bld.id})}} style={mbtn("#5BB8B0")}>＋ Unid.</button>
        </div>}

        <div style={{display:"flex",gap:4,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
          {[{id:"table",i:"📊",l:t.table},{id:"photos",i:"📸",l:t.photos},{id:"plants",i:"📐",l:t.plants},{id:"docs",i:"📄",l:t.docs},{id:"notices",i:"📢",l:t.notices}].map(function(tab){
            return <div key={tab.id} onClick={function(){setDtab(tab.id)}} style={{flexShrink:0,padding:"7px 13px",borderRadius:7,fontSize:11,fontWeight:600,cursor:"pointer",background:dtab===tab.id?bld.color+"20":"#1a1a19",color:dtab===tab.id?bld.color:"#9A9590",border:dtab===tab.id?"1px solid "+bld.color+"40":"1px solid transparent"}}>{tab.i} {tab.l}</div>;
          })}
        </div>

        {/* ═══ TABLE TAB ═══ */}
        {dtab==="table" && <div>
          <div style={{padding:10,background:"rgba(200,164,92,0.05)",borderRadius:8,marginBottom:12}}>
            <div style={{fontSize:9,color:"#9A9590",fontWeight:600,textTransform:"uppercase",letterSpacing:1,marginBottom:3}}>CUB/SC</div>
            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontSize:15,fontWeight:700,color:G}}>{fmt(bld.cub_current)}</span>
              <span style={{fontSize:9,fontWeight:600,color:"#4CAF7D"}}>↑{((bld.cub_current/bld.cub_base-1)*100).toFixed(2)}%</span>
            </div>
            <div style={{fontSize:8,color:"#9A9590",marginTop:1}}>Base: {fmt(bld.cub_base)}</div>
          </div>

          <div style={{display:"flex",gap:4,marginBottom:10,flexWrap:"wrap",alignItems:"center"}}>
            <span style={{fontSize:10,color:"#9A9590",fontWeight:600}}>{t.filter}:</span>
            {[{v:"all",l:t.all},{v:"available",l:t.available},{v:"reserved",l:t.reserved},{v:"sold",l:t.sold}].map(function(f){
              return <span key={f.v} onClick={function(){setFilter(f.v)}} style={{padding:"3px 8px",borderRadius:4,fontSize:9,fontWeight:600,cursor:"pointer",background:filter===f.v?bld.color+"20":"#1e1e1d",color:filter===f.v?bld.color:"#9A9590",border:filter===f.v?"1px solid "+bld.color+"35":"1px solid transparent"}}>{f.l}</span>;
            })}
            <span style={{marginLeft:"auto"}}/>
            <span onClick={function(){setShowUsd(!showUsd)}} style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",background:showUsd?"rgba(76,175,125,0.15)":"rgba(91,143,212,0.1)",color:showUsd?"#4CAF7D":"#5B8FD4",border:showUsd?"1px solid rgba(76,175,125,0.3)":"1px solid rgba(91,143,212,0.3)",display:"inline-flex",alignItems:"center",gap:5}}>{showUsd?"🇧🇷 R$ "+t.showBrl:"🇺🇸 $ "+t.showUsd}</span>
          </div>

          <div style={{overflowX:"auto"}}>
            <table style={{width:"100%",borderCollapse:"separate",borderSpacing:0,borderRadius:8,overflow:"hidden"}}>
              <thead><tr><th style={thS}>{t.unit}</th><th style={thS}>{t.area}</th><th style={thS}>{t.value}{showUsd?" (USD)":""}</th>{adm && <th style={thS}>R$/m²</th>}<th style={thS}>{t.status}</th><th style={thS}>{t.actions}</th></tr></thead>
              <tbody>
              {filtered.map(function(u){
                var p = cp(u, bld);
                return <tr key={u.id}>
                  <td style={Object.assign({},tdS,{fontWeight:600})}>{u.name}</td>
                  <td style={tdS}>{u.area}m²</td>
                  <td style={Object.assign({},tdS,{fontWeight:700,color:"#4CAF7D"})}>{p>0?fmtV(p):"—"}</td>
                  {adm && <td style={Object.assign({},tdS,{fontSize:9,color:"#9A9590"})}>{p>0?fmtV(Math.round(p/u.area)):"—"}</td>}
                  <td style={tdS}><span style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:9,fontWeight:600,color:sC[u.status]}}><span style={{width:5,height:5,borderRadius:"50%",background:sC[u.status]}}/>{sl[u.status]}</span></td>
                  <td style={tdS}>
                    <div style={{display:"flex",gap:3}}>
                      <button onClick={function(e){e.stopPropagation();setSimUnit({u:u,b:bld})}} style={Object.assign({},mbtn(bld.color),{fontSize:8,padding:"3px 6px"})}>🏦</button>
                      <button onClick={function(e){e.stopPropagation();shareUnit(u,bld)}} style={Object.assign({},mbtn("#25D366"),{fontSize:8,padding:"3px 6px",display:"flex",alignItems:"center",gap:2})}><WaIcon size={10}/></button>
                      {adm && <button onClick={function(){setMdl({t:"editUnit",bid:bld.id,u:Object.assign({},u)})}} style={Object.assign({},mbtn(bld.color),{fontSize:8,padding:"3px 6px"})}>✏️</button>}
                      {adm && <button onClick={async function(){await DB.deleteUnit(u.id);refreshUnits();msg("Removida")}} style={Object.assign({},mbtn("#D45B5B"),{fontSize:8,padding:"3px 6px"})}>🗑️</button>}
                    </div>
                  </td>
                </tr>;
              })}
              </tbody>
            </table>
          </div>

          <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
            {["available","reserved","sold"].map(function(s){return <span key={s} style={{padding:"4px 10px",background:sC[s]+"10",borderRadius:5,fontSize:10,fontWeight:600,color:sC[s]}}>{sl[s]}: {units.filter(function(u){return u.status===s}).length}</span>})}
          </div>
        </div>}

        {/* ═══ PHOTOS TAB ═══ */}
        {dtab==="photos" && <div>
          <div className="photo-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            {photos.length > 0 ? photos.map(function(photo,i){
              return <div key={photo.id} className="ch" onClick={function(){if(!adm)setLightbox(photo.url)}} style={{aspectRatio:"1",borderRadius:12,overflow:"hidden",position:"relative",border:photo.is_cover?"2px solid "+G:"1px solid rgba(255,255,255,0.06)",cursor:adm?"default":"zoom-in"}}>
                <img src={photo.url} alt={photo.label||""} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
                {photo.is_cover && <div style={{position:"absolute",top:4,left:4,padding:"2px 7px",borderRadius:4,fontSize:8,fontWeight:700,background:G,color:"#0a0a09"}}>⭐ Capa</div>}
                <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.7)",padding:"5px 8px"}}>
                  {adm ? <input value={photo.label||""} onChange={function(e){
                    DB.updatePhoto(photo.id,{label:e.target.value});
                    setAllPhotos(function(prev){return prev.map(function(p){return p.id===photo.id?Object.assign({},p,{label:e.target.value}):p})});
                  }} style={{width:"100%",background:"transparent",border:"none",color:"#fff",fontSize:10,fontWeight:600,outline:"none",padding:0}} placeholder={"Foto "+(i+1)+" — toque para nomear"}/>
                  : <div style={{fontSize:9,color:"#fff"}}>{photo.label||"Foto "+(i+1)}</div>}
                </div>
                {adm && <div style={{position:"absolute",top:4,right:4,display:"flex",gap:3}}>
                  <button onClick={async function(){
                    await sb.from("photos").update({is_cover:false}).eq("building_id",bld.id);
                    await DB.updatePhoto(photo.id,{is_cover:true});
                    await DB.saveBuilding({id:bld.id,cover_photo:photo.url});
                    refreshPhotos();refreshBuildings();msg("Capa definida!");
                  }} title="Capa" style={{width:24,height:24,borderRadius:"50%",background:photo.is_cover?"rgba(200,164,92,0.9)":"rgba(0,0,0,0.6)",color:photo.is_cover?"#0a0a09":"#fff",border:"none",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>⭐</button>
                  {i>0 && <button onClick={async function(){var prev=photos[i-1];await DB.updatePhoto(photo.id,{sort_order:i-1});await DB.updatePhoto(prev.id,{sort_order:i});refreshPhotos()}} style={{width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>↑</button>}
                  {i<photos.length-1 && <button onClick={async function(){var next=photos[i+1];await DB.updatePhoto(photo.id,{sort_order:i+1});await DB.updatePhoto(next.id,{sort_order:i});refreshPhotos()}} style={{width:24,height:24,borderRadius:"50%",background:"rgba(0,0,0,0.6)",color:"#fff",border:"none",fontSize:10,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>↓</button>}
                  <button onClick={async function(){await DB.deletePhoto(photo.id);refreshPhotos();msg("Foto removida")}} style={{width:24,height:24,borderRadius:"50%",background:"rgba(213,91,91,0.9)",color:"#fff",border:"none",fontSize:11,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
                </div>}
              </div>;
            }) : null}
            {photos.length===0 && <div style={{aspectRatio:"1",borderRadius:8,border:"2px dashed rgba(255,255,255,0.06)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:11,color:"#9A9590",gridColumn:"1/-1"}}><span style={{fontSize:30}}>📸</span>{adm?"Toque abaixo para adicionar":"Nenhuma foto"}</div>}
          </div>
          {adm && <div style={{marginTop:12,padding:14,background:"#1a1a19",borderRadius:10,border:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
              <div style={{fontSize:12,fontWeight:600,color:G}}>📸 Adicionar Foto</div>
              <span style={{fontSize:9,padding:"3px 8px",borderRadius:4,fontWeight:600,background:"rgba(76,175,125,0.1)",color:"#4CAF7D"}}>☁️ Nuvem</span>
            </div>
            <label style={{display:"block",padding:"20px",border:"2px dashed "+bld.color+"50",borderRadius:8,textAlign:"center",cursor:"pointer",background:bld.color+"08",marginBottom:8}}>
              <input type="file" accept="image/*" multiple style={{display:"none"}} onChange={function(e){
                var files=e.target.files;if(!files||!files.length)return;
                Array.from(files).forEach(function(file){
                  DB.uploadFile(file,"fotos-"+bld.id,function(url,name){
                    var label=name.replace(/\.[^/.]+$/,"").replace(/[-_]/g," ");
                    DB.addPhoto({building_id:bld.id,url:url,label:label,sort_order:photos.length}).then(function(){refreshPhotos()});
                  },msg);
                });
                e.target.value="";
              }}/>
              <div style={{fontSize:24,marginBottom:6}}>📁</div>
              <div style={{fontSize:12,fontWeight:600,color:bld.color}}>Toque para selecionar fotos</div>
              <div style={{fontSize:10,color:"#9A9590",marginTop:4}}>Múltiplas fotos de uma vez • Salva na nuvem</div>
            </label>
          </div>}
        </div>}

        {/* ═══ PLANTS TAB ═══ */}
        {dtab==="plants" && <div>
          <div style={{fontSize:11,fontWeight:600,marginBottom:10,color:"#9A9590",textTransform:"uppercase",letterSpacing:1}}>Plantas e Projetos</div>
          {plants.length>0?plants.map(function(p){
            return <div key={p.id} style={{display:"flex",alignItems:"center",gap:9,padding:"10px",background:"#1a1a19",borderRadius:8,border:"1px solid rgba(255,255,255,0.03)",marginBottom:6}}>
              <div style={{width:34,height:34,borderRadius:7,background:bld.color+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>📐</div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600}}>{p.name}</div>
                <div style={{fontSize:9,color:"#9A9590"}}>{(p.type||"pdf").toUpperCase()}</div>
              </div>
              {p.url && <a href={p.url} target="_blank" style={{color:"#5B8FD4",fontSize:10,textDecoration:"none",fontWeight:600}}>Abrir ↗</a>}
              {adm && <button onClick={async function(){await DB.deletePlant(p.id);refreshPlants();msg("Removida")}} style={mbtn("#D45B5B")}>🗑️</button>}
            </div>;
          }):<div style={{textAlign:"center",padding:"20px",color:"#9A9590",fontSize:11}}>Nenhuma planta cadastrada</div>}
          {adm && <div style={{marginTop:10,padding:14,background:"#1a1a19",borderRadius:10,border:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{fontSize:12,fontWeight:600,color:G,marginBottom:10}}>📐 Adicionar Planta</div>
            <L>Nome</L><input id="newPlantName" style={mI} placeholder="Ex: Planta Tipo A — 85m²"/>
            <label style={{display:"block",padding:"16px",border:"2px dashed "+bld.color+"50",borderRadius:8,textAlign:"center",cursor:"pointer",background:bld.color+"08",marginBottom:8}}>
              <input type="file" accept="image/*,.pdf,.dwg" style={{display:"none"}} onChange={function(e){
                var file=e.target.files&&e.target.files[0];if(!file)return;
                var name=document.getElementById("newPlantName").value||file.name.replace(/\.[^/.]+$/,"").replace(/[-_]/g," ");

                DB.uploadFile(file,"plantas-"+bld.id,function(url){
                  DB.addPlant({building_id:bld.id,name:name,url:url,type:type}).then(function(){refreshPlants();document.getElementById("newPlantName").value="";msg("Planta adicionada!")});
                },msg);

              <div style={{fontSize:11,fontWeight:600,color:bld.color}}>Toque para selecionar arquivo</div>
            </label>
          </div>}
        </div>}

        {/* ═══ DOCS TAB ═══ */}
        {dtab==="docs" && <div>
          {docs.map(function(d){
            return <div key={d.id} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 11px",background:"#1a1a19",borderRadius:8,border:"1px solid rgba(255,255,255,0.03)",marginBottom:6}}>
              <div style={{width:34,height:34,borderRadius:7,background:bld.color+"12",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>📄</div>
              <div style={{flex:1}}>
                <div style={{fontSize:11,fontWeight:600}}>{d.name}</div>
                <div style={{fontSize:9,color:"#9A9590"}}>{(d.type||"pdf").toUpperCase()}</div>
              </div>
              {d.url && <a href={d.url} target="_blank" style={{color:"#5B8FD4",fontSize:10,textDecoration:"none",fontWeight:600}}>Abrir ↗</a>}

            </div>;
          })}
          {adm && <div style={{marginTop:10,padding:14,background:"#1a1a19",borderRadius:10,border:"1px solid rgba(255,255,255,0.04)"}}>
            <div style={{fontSize:12,fontWeight:600,color:G,marginBottom:10}}>📄 Adicionar Documento</div>
            <L>Nome</L><input id="newDocName" style={mI} placeholder="Ex: Book de Vendas"/>
            <label style={{display:"block",padding:"16px",border:"2px dashed "+bld.color+"50",borderRadius:8,textAlign:"center",cursor:"pointer",background:bld.color+"08",marginBottom:8}}>

            {bemVal>0 && <div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase"}}>Bem</div><div style={{fontSize:13,fontWeight:700,color:"#E8A94E"}}>{fmt(bemVal)}</div></div>}
            <div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase"}}>Saldo</div><div style={{fontSize:13,fontWeight:700,color:"#5B8FD4"}}>{fmt(saldo)}</div></div>
            <div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase"}}>Mensal ({months}x)</div><div style={{fontSize:16,fontWeight:700,color:"#4CAF7D"}}>{fmt(pmt)}</div></div>
            {numBaloes>0 && <div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase"}}>Balão ({numBaloes}x)</div><div style={{fontSize:13,fontWeight:700,color:"#D45B5B"}}>{fmt(balaoValor)}</div></div>}
            <div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase"}}>Total</div><div style={{fontSize:13,fontWeight:700,color:"#D45B5B"}}>{fmt(totalPago)}</div></div>
          </div>
        </div>
        <button onClick={function(){
          var text="🏦 *Simulação*\n🏢 "+b.name+" — "+data.u.name+"\n💰 Valor: "+fmt(price)+"\n💳 Entrada: "+fmt(down)+(bemVal>0?"\n🚗 Bem: "+fmt(bemVal):"")+ "\n🏦 Saldo: "+fmt(saldo)+"\n📅 "+months+"x de "+fmt(pmt)+(numBaloes>0?"\n🎈 "+numBaloes+"x balão de "+fmt(balaoValor):"")+"\n📞 "+CT.phone;
          window.open("https://wa.me/"+waNum+"?text="+encodeURIComponent(text),"_blank");
        }} style={{width:"100%",marginTop:8,padding:"11px",borderRadius:7,fontSize:13,fontWeight:600,background:"#25D366",color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><WaIcon size={16}/> {t.send}</button>
        <button style={mC} onClick={function(){setSimUnit(null)}}>{t.close}</button>
      </div>
    );
  }
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>

  // ═══ DASHBOARD ═══
  function DashView() {
    var recentChanges = [];
    D.buildings.filter(function(b){return b.active}).forEach(function(b){
      b.units.forEach(function(u){
        (u.history || []).forEach(function(h){
          recentChanges.push(Object.assign({},h,{unit:u.name,bld:b.name,color:b.color}));
        });
      });
    });
    recentChanges.sort(function(a,b){return (b.date||"").localeCompare(a.date||"")});

    return (
      <div style={{padding:"14px clamp(12px, 3vw, 40px)"}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14}}>
          <span style={{fontSize:18}}>📊</span>
          <span style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:16,fontWeight:600,flex:1}}>Dashboard</span>
          <button onClick={printAll} style={Object.assign({},mb(G),{fontSize:8})}>🖨️ Relatório</button>
        </div>
        <div className="kpi-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
          {[{n:stats.totalU,l:"Unidades",c:"#F5F0E8"},{n:stats.avail,l:"Disponíveis",c:"#4CAF7D"},{n:stats.reserved,l:"Reservadas",c:"#E8A94E"},{n:stats.sold,l:"Vendidas",c:"#D45B5B"},{n:stats.bldCount,l:"Empreend.",c:"#5B8FD4"},{n:fmt(stats.totalVal),l:"VGV Total",c:G,small:true}].map(function(s,i){
            return <div key={i} style={{background:"#1a1a19",borderRadius:9,padding:"10px 8px",textAlign:"center",border:"1px solid rgba(255,255,255,0.03)"}}><div style={{fontSize:s.small?11:20,fontWeight:700,color:s.c,lineHeight:1.2}}>{s.n}</div><div style={{fontSize:7,color:"#9A9590",textTransform:"uppercase",letterSpacing:.5,marginTop:2}}>{s.l}</div></div>;
          })}
        </div>
        <div style={{fontSize:10,fontWeight:600,color:"#9A9590",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Por Empreendimento</div>

          var a=b.units.filter(function(u){return u.status==="available"}).length;
          var r=b.units.filter(function(u){return u.status==="reserved"}).length;
          var s=b.units.filter(function(u){return u.status==="sold"}).length;
          var vgv=b.units.reduce(function(ac,u){return ac+cp(u,b)},0);
          return <div key={b.id} style={{background:"#1a1a19",borderRadius:9,padding:10,marginBottom:7,border:"1px solid rgba(255,255,255,0.03)"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6}}><span style={{fontSize:16}}>{b.emoji}</span><span style={{fontSize:12,fontWeight:600,flex:1}}>{b.name}</span><span style={{fontSize:8,color:G}}>{fmt(vgv)}</span></div>
            <div style={{display:"flex",gap:4}}><span style={Object.assign({},tg,{color:"#4CAF7D",background:"rgba(76,175,125,0.08)"})}>{a} disp.</span><span style={Object.assign({},tg,{color:"#E8A94E",background:"rgba(232,169,78,0.08)"})}>{r} res.</span><span style={Object.assign({},tg,{color:"#D45B5B",background:"rgba(213,91,91,0.08)"})}>{s} vend.</span><span style={Object.assign({},tg,{color:b.color})}>{b.commission}%</span></div>
          </div>;
        })}
        {recentChanges.length > 0 && <div>
          <div style={{fontSize:10,fontWeight:600,color:"#9A9590",textTransform:"uppercase",letterSpacing:1,marginTop:14,marginBottom:8}}>Histórico Recente</div>
          {recentChanges.slice(0,10).map(function(h,i){
            return <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.02)",fontSize:10}}>
              <span style={{fontSize:8,color:"#9A9590",minWidth:62}}>{h.date}</span>
              <span style={{fontWeight:600}}>{h.unit}</span>
              <span style={{color:"#9A9590",fontSize:9}}>{h.bld}</span>
              <span style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:3}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:sC[h.from]}}/>
                <span style={{color:"#666"}}>→</span>
                <span style={{width:6,height:6,borderRadius:"50%",background:sC[h.to]}}/>
                <span style={{fontSize:8,color:sC[h.to],fontWeight:600}}>{sL[h.to]}</span>
              </span>
            </div>;
          })}
        </div>}
      </div>
    );
  }

            </div>
          );
        })}
      </div>

          <button style={mb("#5BB8B0")} onClick={function(){setMdl({t:"addUnit",bid:bld.id})}}>＋ Unid.</button>
          <button style={mb(bld.color)} onClick={function(){upB(bld.id,{status:bld.status==="ready"?"construction":"ready"})}}>{bld.status==="ready"?"🏗️→Obra":"✅→Pronto"}</button>

            <button onClick={function(){setVw("compare")}} style={Object.assign({},mb("#5B8FD4"),{fontSize:8})}>📊 Comparar</button>

                    {adm && <button onClick={function(){setMdl({t:"editUnit",bid:bld.id,u:Object.assign({},u)})}} style={Object.assign({},mb(bld.color),{fontSize:7,padding:"3px 6px"})}>✏️</button>}

          </div>
          <button onClick={function(){printBld(bld.id)}} style={{width:"100%",marginTop:10,padding:"9px",borderRadius:7,fontSize:10,fontWeight:600,background:bld.color,color:"#0f0f0e",border:"none",cursor:"pointer"}}>🖨️ Exportar PDF</button>
        </div>}

        {dtab==="photos" && <div>

          <div className="photo-grid" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>

            })}
          </div>

        {dtab==="plants" && <div>
          <div style={{fontSize:10,fontWeight:600,marginBottom:10,color:"#9A9590",textTransform:"uppercase",letterSpacing:1}}>Plantas e Projetos</div>
          {(bld.plants && bld.plants.length > 0) ? bld.plants.map(function(p,i){
            return <div key={i} style={{display:"flex",alignItems:"center",gap:9,padding:"10px",background:"#1a1a19",borderRadius:8,border:"1px solid rgba(255,255,255,0.03)",marginBottom:6}}>

            </div>;
          })}
        </div>}
      </div>
    );
  }

      </div>
      <button style={mP(b.color)} onClick={function(){upB(b.id,Object.assign({},f,{gradient:"linear-gradient(135deg,"+f.color+"40,"+f.color+"80)",financing:{entradaPct:f.finEntrada,parcelas:f.finParcelas,taxaMensal:f.finTaxa,indice:f.finIndice}}));setMdl(null);msg("Salvo!")}}>Salvar</button><button style={mC} onClick={function(){setMdl(null)}}>Cancelar</button>
    </div>;
  }

  // ═══ MAIN RENDER ═══
  return (
    <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",background:siteConfig.bgColor||"#0f0f0e",color:"#F5F0E8",minHeight:"100vh",maxWidth:960,margin:"0 auto",position:"relative",paddingBottom:80}}>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
      <style>{String.raw`@keyframes p{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}div::-webkit-scrollbar{display:none}`}</style>

      {/* HERO */}
      <div style={{padding:"44px 20px 24px",textAlign:"center",background:siteConfig.heroBanner ? "url("+siteConfig.heroBanner+") center/cover no-repeat" : "linear-gradient(170deg,"+(siteConfig.bgColor||"#0f0f0e")+",#1c1914,"+(siteConfig.bgColor||"#0f0f0e")+")",position:"relative",overflow:"hidden"}}>
        {siteConfig.heroBanner && siteConfig.heroOverlay!==false && <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.65)",pointerEvents:"none"}}/>}
        <div style={{position:"absolute",top:"-40%",left:"-40%",width:"180%",height:"180%",background:"radial-gradient(ellipse at 50% 50%,rgba(200,164,92,0.05) 0%,transparent 65%)",pointerEvents:"none"}}/>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(200,164,92,0.1)",border:"1px solid rgba(200,164,92,0.2)",padding:"6px 16px",borderRadius:50,fontSize:10,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:G,marginBottom:14,position:"relative"}}><span style={{width:5,height:5,background:"#4CAF7D",borderRadius:"50%",animation:"p 2s infinite"}}/>Portal Exclusivo</div>
        <h1 style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:"clamp(28px, 5vw, 48px)",fontWeight:700,lineHeight:1.1,marginBottom:7,position:"relative"}}>Portal do <span style={{color:G}}>Corretor</span></h1>
        <p style={{fontSize:"clamp(11px, 1.5vw, 16px)",color:"#9A9590",maxWidth:500,margin:"0 auto",lineHeight:1.6,position:"relative"}}>Empreendimentos, tabelas com correção CUB/SC, simulador e materiais.</p>
        {adm && <div onClick={function(){setAdm(false);msg("Admin off")}} style={{marginTop:10,display:"inline-flex",alignItems:"center",gap:5,padding:"4px 12px",background:"rgba(76,175,125,0.1)",borderRadius:20,fontSize:9,fontWeight:600,color:"#4CAF7D",cursor:"pointer",position:"relative"}}>🔓 Admin — sair</div>}
      </div>

      {/* CONTACT */}
      <div style={{display:"flex",borderTop:"1px solid rgba(200,164,92,0.1)",borderBottom:"1px solid rgba(200,164,92,0.1)",background:"rgba(200,164,92,0.02)"}}>
        {[{href:"mailto:"+CT.email,i:"\u2709\uFE0F",l:"E-mail"},{href:"tel:"+CT.phone,i:"\uD83D\uDCDE",l:"Ligar"},{href:CT.ig[0].u,i:"\uD83C\uDF10",l:"MK Realty",t:"_blank",isIg:true},{href:CT.ig[1].u,i:"\uD83C\uDF10",l:"D&SS",t:"_blank",isIg:true}].map(function(x,i){
          return <a key={i} href={x.href} target={x.t} style={{flex:1,display:"flex",alignItems:"center",justifyContent:"center",gap:3,padding:"8px 3px",fontSize:8,fontWeight:600,color:G,textDecoration:"none",borderRight:i<3?"1px solid rgba(200,164,92,0.08)":"none"}}>{x.isIg ? <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg> : x.i} {x.l}</a>;
        })}
      </div>

      {/* NAV */}
      <div style={{position:"sticky",top:0,zIndex:100,background:siteConfig.bgColor||"#0f0f0e",padding:"10px 10px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
        <div style={{display:"flex",gap:4,overflowX:"auto",paddingBottom:9,scrollbarWidth:"none"}}>
          <TabBtn active={vw==="home"} onClick={function(){setVw("home")}}>🏠 Início</TabBtn>
          {adm && <TabBtn active={vw==="dash"} green onClick={function(){setVw("dash")}}>📊 Dashboard</TabBtn>}
          {adm && <TabBtn active={vw==="manage"} green onClick={function(){setVw("manage")}}>⚙️ Gerenciar</TabBtn>}
          {adm && <TabBtn active={false} green onClick={function(){setMdl({t:"siteSettings"})}}>🎨 Config</TabBtn>}
          {vis.map(function(b){return <TabBtn key={b.id} active={vw==="detail"&&sel===b.id} onClick={function(){go(b.id)}}>{b.name.replace("Ed. ","").replace("Imóveis de ","")}</TabBtn>})}
        </div>
      </div>

      {vw==="home" && <HomeView/>}
      {vw==="dash" && adm && <DashView/>}
      {vw==="manage" && adm && <ManageView/>}
      {vw==="detail" && bld && <DetailView/>}
      {vw==="compare" && <CompareView/>}

      {/* FOOTER */}
      <div style={{textAlign:"center",padding:"20px 16px",borderTop:"1px solid rgba(255,255,255,0.03)",marginTop:12}}>
        <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:12,color:G,marginBottom:4}}>MK Realty & D&SS Incorporação</div>
        <div style={{fontSize:8,color:"#9A9590",lineHeight:1.8}}>✉️ {CT.email} • 📞 {CT.phone}<br/>IG: {CT.ig.map(function(i){return i.h}).join(" • ")}</div>
        <div style={{fontSize:7,color:"#555",marginTop:5}}>Portal exclusivo para corretores parceiros • MK Realty & D&SS Incorporação Ltda • 2026</div>
      </div>

      {/* FABS */}
      <div style={{position:"fixed",bottom:14,right:12,zIndex:200,display:"flex",flexDirection:"column",gap:6,alignItems:"flex-end"}}>
        {vw==="detail" && bld && <button onClick={function(){printBld(bld.id)}} style={fab("#3B82F6")}>🖨️</button>}
        <a href={"https://wa.me/"+CT.wa+"?text="+encodeURIComponent("Olá! Vim pelo Portal do Corretor 🏢")} target="_blank" style={Object.assign({},fab("#25D366"),{textDecoration:"none"})}>💬</a>
        {!adm && <button onClick={function(){setMdl({t:"login"})}} style={fab(G)}>🔐</button>}
        {adm && <button onClick={function(){setAdm(false);msg("Admin desativado")}} style={Object.assign({},fab("#D45B5B"),{fontSize:12,fontWeight:700})}>✕</button>}
      </div>

      {mdl && <div onClick={function(){setMdl(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
        <div onClick={function(e){e.stopPropagation()}} style={{background:"#1a1a19",borderRadius:13,padding:17,width:"100%",maxWidth:370,maxHeight:"82vh",overflow:"auto",border:"1px solid rgba(255,255,255,0.05)"}}>
          <ModalContent/>
        </div>
      </div>}

      {simUnit && <div onClick={function(){setSimUnit(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:14}}>
        <div onClick={function(e){e.stopPropagation()}} style={{background:"#1a1a19",borderRadius:13,padding:17,width:"100%",maxWidth:370,maxHeight:"82vh",overflow:"auto",border:"1px solid rgba(255,255,255,0.05)"}}>
          <SimModal/>
        </div>
      </div>}

      {toast && <div style={{position:"fixed",bottom:70,left:"50%",transform:"translateX(-50%)",background:"#2a2a28",color:"#F5F0E8",padding:"7px 15px",borderRadius:7,fontSize:10,fontWeight:500,zIndex:600,boxShadow:"0 4px 14px rgba(0,0,0,0.5)",whiteSpace:"nowrap"}}>{toast}</div>}

      {printHtml && <div onClick={function(){setPrintHtml(null)}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.85)",zIndex:700,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:10}}>
        <div onClick={function(e){e.stopPropagation()}} style={{width:"100%",maxWidth:460,height:"80vh",background:"#fff",borderRadius:12,overflow:"hidden",display:"flex",flexDirection:"column"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",background:"#f5f0e8",borderBottom:"1px solid #ddd"}}>
            <span style={{fontSize:14}}>🖨️</span>
            <span style={{fontSize:12,fontWeight:600,color:"#1a1a1a",flex:1}}>Visualização para Impressão</span>
            <button onClick={function(){
              var iframeEl = document.getElementById("print-frame");
              if (iframeEl && iframeEl.contentWindow) { iframeEl.contentWindow.print(); }
            }} style={{padding:"5px 12px",borderRadius:6,fontSize:10,fontWeight:600,background:"#3B82F6",color:"#fff",border:"none",cursor:"pointer"}}>🖨️ Imprimir</button>
            <button onClick={function(){setPrintHtml(null)}} style={{padding:"5px 10px",borderRadius:6,fontSize:12,fontWeight:600,background:"#eee",color:"#666",border:"none",cursor:"pointer"}}>✕</button>
          </div>
          <iframe id="print-frame" srcDoc={printHtml} style={{flex:1,width:"100%",border:"none"}}/>
        </div>
      </div>}
    </div>
  );
}

const fab = function(bg){return{width:42,height:42,borderRadius:"50%",background:bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:17,boxShadow:"0 3px 12px "+bg+"55",cursor:"pointer",border:"none"}};
const mb = function(c){return{padding:"4px 9px",borderRadius:5,fontSize:8,fontWeight:600,background:c+"15",color:c,border:"1px solid "+c+"30",cursor:"pointer"}};
const tg = {padding:"3px 7px",background:"#1e1e1d",borderRadius:4,fontSize:8,fontWeight:500,color:"#aaa"};
const thS = {background:"rgba(200,164,92,0.06)",color:"#C8A45C",padding:"7px 6px",textAlign:"left",fontWeight:600,fontSize:7,textTransform:"uppercase",letterSpacing:1};
const tdS = {padding:"7px 6px",borderBottom:"1px solid rgba(255,255,255,0.025)"};
const mT = {fontFamily:"'Playfair Display',Georgia,serif",fontSize:15,fontWeight:600,marginBottom:11,color:"#F5F0E8"};
const mI = {width:"100%",padding:"8px 10px",background:"#222",border:"1px solid rgba(255,255,255,0.05)",borderRadius:6,color:"#F5F0E8",fontSize:10,fontFamily:"inherit",outline:"none",marginBottom:6};
const mP = function(c){return{width:"100%",padding:"9px",borderRadius:6,fontSize:10,fontWeight:600,background:c||"#C8A45C",color:"#0f0f0e",border:"none",cursor:"pointer",marginTop:3}};
const mC = {width:"100%",padding:"9px",borderRadius:6,fontSize:10,fontWeight:600,background:"transparent",color:"#9A9590",border:"1px solid rgba(255,255,255,0.05)",cursor:"pointer",marginTop:3};
const L = function(props){return <label style={{fontSize:8,color:"#9A9590",fontWeight:600,display:"block",marginBottom:2,textTransform:"uppercase",letterSpacing:.5}}>{props.children}</label>};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>

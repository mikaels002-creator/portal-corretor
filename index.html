            <div style={{fontSize:32,marginBottom:8}}>🏢</div>
            <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>Teste Grátis 14 Dias</div>
            <div style={{fontSize:14,color:"#666",marginTop:4}}>Sem cartão de crédito. Sem compromisso.</div>
          </div>
          <div style={{marginBottom:10}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>Seu nome *</div><input id="ld_nome" onKeyDown={function(e){e.stopPropagation()}} style={{width:"100%",padding:"12px 16px",borderRadius:10,background:"#111",border:"1px solid #222",color:"#E8E4DD",fontSize:15,outline:"none"}} placeholder="João Silva"/></div>
          <div style={{marginBottom:10}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>Email profissional *</div><input id="ld_email" type="email" onKeyDown={function(e){e.stopPropagation()}} style={{width:"100%",padding:"12px 16px",borderRadius:10,background:"#111",border:"1px solid #222",color:"#E8E4DD",fontSize:15,outline:"none"}} placeholder="joao@construtora.com.br"/></div>
          <div style={{display:"flex",gap:10,marginBottom:10}}>
            <div style={{flex:1}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>WhatsApp</div><input id="ld_tel" onKeyDown={function(e){e.stopPropagation()}} style={{width:"100%",padding:"12px 16px",borderRadius:10,background:"#111",border:"1px solid #222",color:"#E8E4DD",fontSize:15,outline:"none"}} placeholder="47999999999"/></div>
            <div style={{flex:1}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>Cidade</div><input id="ld_cidade" onKeyDown={function(e){e.stopPropagation()}} style={{width:"100%",padding:"12px 16px",borderRadius:10,background:"#111",border:"1px solid #222",color:"#E8E4DD",fontSize:15,outline:"none"}} placeholder="São Paulo"/></div>
          </div>
          <div style={{marginBottom:16}}><div style={{fontSize:12,color:"#666",marginBottom:4}}>Nome da construtora</div><input id="ld_empresa" onKeyDown={function(e){e.stopPropagation()}} style={{width:"100%",padding:"12px 16px",borderRadius:10,background:"#111",border:"1px solid #222",color:"#E8E4DD",fontSize:15,outline:"none"}} placeholder="Construtora ABC"/></div>
          <button className="bh" onClick={submitLead} style={{width:"100%",padding:"14px",borderRadius:12,background:"linear-gradient(135deg,"+G+",#a88a3c)",color:"#0a0a09",fontSize:16,fontWeight:700,border:"none"}}>🚀 Criar Minha Conta Grátis</button>
          <div style={{textAlign:"center",marginTop:12,fontSize:12,color:"#444"}}>Ao se cadastrar, você concorda com nossos termos de uso.</div>
        </div>}
      </div>
    </div>
  };

  return <div>
    <Nav/>
    <Hero/>
    <Features/>
    <HowItWorks/>
    <Pricing/>
    <Testimonials/>
    <CTA/>
    <Footer/>
    <LeadForm/>
    {toast&&<div style={{position:"fixed",bottom:24,right:24,padding:"12px 24px",borderRadius:12,background:"#1a1a20",color:"#fff",fontSize:14,border:"1px solid #333",zIndex:1001}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>

var DB = {
  // --- Site Config ---
  loadConfig: async function(){
    var res = await sb.from("site_config").select("*");
    if(res.error || !res.data) return {};
    var cfg = {};
    res.data.forEach(function(r){ cfg[r.key] = r.value; });
    return cfg;
  },
  saveConfig: async function(key, value){
    await sb.from("site_config").upsert({key:key, value:String(value)});
  },
  saveConfigAll: async function(cfg){
    var rows = Object.keys(cfg).map(function(k){return {key:k, value:String(cfg[k])}});
    await sb.from("site_config").upsert(rows);
  },

  // --- Buildings ---
  loadBuildings: async function(){
    var res = await sb.from("buildings").select("*").order("sort_order");
    return res.data || [];
  },
  insertBuilding: async function(b){
    var r=await sb.from("buildings").insert(b);if(r.error)console.log("insert error:",r.error);return r;
  },
  deleteBuilding: async function(id){
    await sb.from("buildings").delete().eq("id", id);
  },

  // --- Units ---
  loadUnits: async function(buildingId){
    var q = sb.from("units").select("*").order("sort_order");
    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  loadAllUnits: async function(){
    var res = await sb.from("units").select("*").order("sort_order");
    return res.data || [];
  },
  insertUnit: async function(u){
    var r=await sb.from("units").insert(u);if(r.error)console.log("insert error:",r.error);return r;
  },
  deleteUnit: async function(id){
    await sb.from("units").delete().eq("id", id);
  },

  // --- Photos ---
  loadPhotos: async function(buildingId){
    var q = sb.from("photos").select("*").order("sort_order");
    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  addPhoto: async function(p){
    await sb.from("photos").insert(p);
  },
  updatePhoto: async function(id, changes){
    await sb.from("photos").update(changes).eq("id", id);
  },
  deletePhoto: async function(id){
    await sb.from("photos").delete().eq("id", id);
  },
  reorderPhotos: async function(photos){
    for(var i=0;i<photos.length;i++){
      await sb.from("photos").update({sort_order:i}).eq("id",photos[i].id);
    }
  },

  // --- Plants ---
  loadPlants: async function(buildingId){
    var q = sb.from("plants").select("*").order("sort_order");
    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  addPlant: async function(p){
    await sb.from("plants").insert(p);
  },
  deletePlant: async function(id){
    await sb.from("plants").delete().eq("id", id);
  },

  // --- Documents ---
  loadDocuments: async function(buildingId){
    var q = sb.from("documents").select("*").order("sort_order");
    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  addDocument: async function(d){
    await sb.from("documents").insert(d);
  },
  deleteDocument: async function(id){
    await sb.from("documents").delete().eq("id", id);
  },

  // --- Notices ---
  loadNotices: async function(buildingId){

    if(buildingId) q = q.eq("building_id", buildingId);
    var res = await q;
    return res.data || [];
  },
  addNotice: async function(n){
    await sb.from("notices").insert(n);
  },
  deleteNotice: async function(id){
    await sb.from("notices").delete().eq("id", id);
  },

  // --- Brokers ---
  loadBrokers: async function(){
    var res = await sb.from("brokers").select("*").order("id",{ascending:false});
    return res.data || [];
  },
  addBroker: async function(b){
    await sb.from("brokers").insert(b);
  },
  deleteBroker: async function(id){
    await sb.from("brokers").delete().eq("id", id);
  },
  loadSales: async function(){var r=await sb.from("broker_sales").select("*").order("id",{ascending:false});return r.data||[]},
  addSale: async function(s){await sb.from("broker_sales").insert(s)},
  updateSale: async function(id,c){await sb.from("broker_sales").update(c).eq("id",id)},
  // --- Admin Users ---
  loadAdminUsers: async function(){var r=await sb.from("admin_users").select("*").order("id");return r.data||[]},
  addAdminUser: async function(u){return await sb.from("admin_users").insert(u)},
  updateAdminUser: async function(id,c){await sb.from("admin_users").update(c).eq("id",id)},
  deleteAdminUser: async function(id){await sb.from("admin_users").delete().eq("id",id)},
  // --- Analytics ---
  trackEvent: function(type,data){try{sb.from("portal_analytics").insert({event_type:type,event_data:data||{},page:window.location.hash||"home",user_agent:navigator.userAgent.substring(0,100)})}catch(e){}},
  loadAnalytics: async function(days){
    var since=new Date();since.setDate(since.getDate()-(days||30));
    var r=await sb.from("portal_analytics").select("*").gte("created_at",since.toISOString()).order("created_at",{ascending:false}).limit(5000);
    return r.data||[];
  },
  // --- AI Reports ---
  saveReport: async function(r){await sb.from("ai_reports").insert(r)},
  loadReports: async function(){var r=await sb.from("ai_reports").select("*").order("id",{ascending:false}).limit(20);return r.data||[]},

  deleteTask: async function(id){await sb.from("tasks").delete().eq("id",id)},
  loadTaskComments: async function(taskId){var r=await sb.from("task_comments").select("*").eq("task_id",taskId).order("id",{ascending:true});return r.data||[]},
  addTaskComment: async function(c){await sb.from("task_comments").insert(c)},
  // --- Messages ---
  loadMessages: async function(channel){var r=await sb.from("messages").select("*").eq("channel",channel).order("id",{ascending:true}).limit(200);return r.data||[]},
  sendMessage: async function(m){await sb.from("messages").insert(m)},

  // --- File Upload ---
  uploadFile: function(file, folder, callback, msgFn){
    if(msgFn) msgFn("☁️ Enviando...");
    var fileName = folder + "/" + Date.now() + "-" + file.name.replace(/[^a-zA-Z0-9._-]/g, "_");
    sb.storage.from("arquivos").upload(fileName, file, {upsert:true}).then(function(res){
      if(res.error){if(msgFn) msgFn("Erro: "+res.error.message); return;}
      var publicUrl = SB_URL + "/storage/v1/object/public/arquivos/" + fileName;
      callback(publicUrl, file.name);
      if(msgFn) msgFn("☁️ Upload concluído!");
    }).catch(function(e){if(msgFn) msgFn("Erro no upload"); console.log(e);});
  }
};

var SmartImg = function(props){

  var printBld = function(bid){DB.trackEvent("pdf_export",{building_id:bid});

    var units=getUnits(bid);
    var logo=cfg.report_logo?"<img src='"+cfg.report_logo+"' style='max-height:50px;max-width:180px;margin-bottom:12px'/>":"";
    var coverImg=b.cover_photo?"<img src='"+b.cover_photo+"' style='width:100%;max-height:220px;object-fit:cover;border-radius:12px;margin-bottom:16px'/>":"";
    var currency=showUsd?"USD":"BRL";
    var usdWarn=showUsd?"<div style='margin:12px 0;padding:10px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;font-size:10px;color:#856404;text-align:center'>⚠️ Valores em USD são referência. Cotação confirmada no dia da transação. Contratos em BRL. Ref: R$ "+getUsdRate().toFixed(2)+"</div>":"";
    var rows=units.map(function(u){var p=cp(u,b);var showPrice=u.status==="available";return "<tr><td>"+u.name+"</td><td>"+u.area+"m²</td><td style='font-weight:600;color:#2e7d52'>"+(showPrice&&p>0?fmtV(p):"—")+"</td><td style='color:"+sC[u.status]+";font-weight:600'>"+sL[u.status]+"</td></tr>"}).join("");
    var html="<html><head><meta charset='UTF-8'><title>"+b.name+"</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Helvetica,sans-serif;padding:36px;color:#1a1a1a;max-width:780px;margin:0 auto}h1{font-size:24px;margin-bottom:4px}h2{font-size:12px;color:#888;font-weight:400;margin-bottom:18px}table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#f5f0e8;padding:10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd}td{padding:10px;border-bottom:1px solid #eee;font-size:12px}.ft{margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:9px;color:#999;text-align:center}.badge{display:inline-block;padding:4px 12px;border-radius:16px;font-size:10px;font-weight:700;color:#fff;margin-bottom:12px}.cub{font-size:11px;color:#666;margin-bottom:10px;padding:8px 10px;background:#f8f6f2;border-radius:5px}</style></head><body>"+logo+coverImg+"<h1>"+b.name+"</h1><h2>"+b.subtitle+"</h2><div class='badge' style='background:"+b.color+"'>"+(b.status==="ready"?t.ready:t.construction+" — "+b.construction_pct+"%")+"</div><div class='cub'>CUB/SC: "+fmt(b.cub_base)+" → "+fmt(b.cub_current)+" ("+((b.cub_current/b.cub_base-1)*100).toFixed(2)+"%)</div>"+usdWarn+"<table><thead><tr><th>"+t.unit+"</th><th>"+t.area+"</th><th>"+t.value+(showUsd?" (USD)":"")+"</th><th>"+t.status+"</th></tr></thead><tbody>"+rows+"</tbody></table><div class='ft'>"+contactLine+"</div></body></html>";
    var w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print()},500)}
  };

  // ═══ BACKUP / EXPORT ═══
  var exportBackup = async function(){
    msg("Exportando dados...");
    var data={buildings:buildings,units:allUnits,photos:allPhotos,plants:allPlants,documents:allDocs,notices:allNotices,brokers:brokers,config:cfg,exportDate:new Date().toISOString()};
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="portal-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    msg("Backup exportado!");
  };

    var b=buildings.find(function(x){return x.id===bid});if(!b)return;

        if(u.length===0){issues.push({type:"warning",msg:b.name+": sem unidades cadastradas"});score-=10}
        if(p.length===0){issues.push({type:"warning",msg:b.name+": sem fotos"});score-=5}
        var avail=u.filter(function(x){return x.status==="available"});
        var noPrice=avail.filter(function(x){return!x.base_price||x.base_price===0});
        if(noPrice.length>0){issues.push({type:"error",msg:b.name+": "+noPrice.length+" unidades disponíveis sem preço"});score-=noPrice.length*2}
        if(!b.subtitle){issues.push({type:"info",msg:b.name+": sem descrição"});score-=2}
        if(b.cub_current<=0){issues.push({type:"error",msg:b.name+": CUB zerado ou inválido"});score-=15}

      if(!cfg.wa_number){issues.push({type:"warning",msg:"WhatsApp não configurado"});score-=5}
      if(brokers.length===0){issues.push({type:"info",msg:"Nenhum corretor cadastrado"});score-=3}
      if(issues.length===0) issues.push({type:"success",msg:"Tudo perfeito! Nenhum problema encontrado."});

    var extractPdf=async function(file){

          var page=await pdf.getPage(i);
          var tc=await page.getTextContent();
          var items=tc.items;
          // Group text by Y position to reconstruct rows
          var rows={};
          items.forEach(function(item){
            var y=Math.round(item.transform[5]);
            if(!rows[y])rows[y]=[];
            rows[y].push({x:item.transform[4],text:item.str});
          });
          // Sort by Y descending (PDF y-axis is bottom-up) then X ascending
          var sortedYs=Object.keys(rows).map(Number).sort(function(a,b){return b-a});
          sortedYs.forEach(function(y){
            var row=rows[y].sort(function(a,b){return a.x-b.x});
            var line=row.map(function(r){return r.text}).join(" | ");
            allText+=line+"\n";
          });
          allText+="\n--- Página "+i+" ---\n\n";
        }
        setRawText(allText);
        setProgress("Analisando dados...");
        // Parse the text
        var lines=allText.split("\n").filter(function(l){return l.trim().length>3});
        var units=[];
        var pdfLines=allText.split("\n");
        var lastAreaNums=[];

        pdfLines.forEach(function(line){
          var parts=line.split("|").map(function(p){return p.trim()}).filter(function(p){return p.length>0});
          if(parts.length<1)return;

          // Find unit names (3-4 digit numbers, optionally "- Type")
          var unitEntries=[];
          parts.forEach(function(p,idx){
            if(/^\d{3,4}(\s*-\s*(Master|Luxo|Superior|Standard|Studio|Loja|Sala|Ap\w*))?$/.test(p)){
              unitEntries.push({idx:idx,name:p});
            }
          });

          // If NO units found, extract area numbers for next line
          if(unitEntries.length===0){
            var nums=[];
            parts.forEach(function(p){
              var m=p.match(/^(\d+[.,]\d+)$/);
              if(m){var v=parseFloat(m[1].replace(",","."));if(v>5&&v<500)nums.push(v)}
              else{var m2=p.match(/^(\d{2})$/);if(m2){var v2=parseInt(m2[1]);if(v2>=15&&v2<=99)nums.push(v2)}}
            });
            if(nums.length>=2) lastAreaNums=nums;
            return;
          }

          // Process each unit on this line
          unitEntries.forEach(function(entry,uiIdx){
            var name=entry.name;
            var nextIdx=uiIdx<unitEntries.length-1?unitEntries[uiIdx+1].idx:parts.length;
            var segment=parts.slice(entry.idx+1,nextIdx);

            var area=0;var price=0;var status="available";
            var inlineAreas=[];

            segment.forEach(function(s){
              if(/^vendid/i.test(s)){status="sold";return}
              if(/^reserv/i.test(s)){status="reserved";return}
              if(/^indispon/i.test(s)){status="sold";return}
              if(/^R\$/.test(s)){
                var pv=parseFloat(s.replace(/R\$\s*/,"").replace(/\./g,"").replace(",","."));
                if(pv>10000) price=pv;
                return;
              }
              var numM=s.match(/^(\d+[.,]?\d*)$/);
              if(numM){
                var v=parseFloat(numM[1].replace(",","."));
                if(v>5&&v<500) inlineAreas.push(v);
              }
            });

            // Use inline areas if available (take largest = m² total)
            if(inlineAreas.length>=1){
              area=Math.max.apply(null,inlineAreas);
            }

            // If no inline area, use from previous area line
            if(area===0&&lastAreaNums.length>0){
              var pairIdx=uiIdx*2;
              if(pairIdx+1<lastAreaNums.length){
                area=Math.max(lastAreaNums[pairIdx],lastAreaNums[pairIdx+1]);
              }else if(pairIdx<lastAreaNums.length){
                area=lastAreaNums[pairIdx];
              }
            }

            if(area>0||price>0||status!=="available"){
              var dup=units.find(function(u){return u.name===name});
              if(!dup) units.push({name:name,area:area,price:price,status:status,include:true});
            }
          });

          // Clear area cache after using
          lastAreaNums=[];
        });

        // Sort by unit number
        units.sort(function(a,b){var na=parseInt(a.name)||0;var nb=parseInt(b.name)||0;return na-nb});
        setParsed(units);
        setStep(units.length>0?"review":"raw");
        setProgress(units.length+" unidades encontradas");

        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid "+borderColor}}>
          <div style={{fontSize:14,fontWeight:600,color:textColor,marginBottom:8}}>👤 {t.client}</div>
          <input id="sim_client" style={Object.assign({},mI,{marginBottom:0})} value={clientName} onChange={function(e){setClientName(e.target.value)}} onKeyDown={function(e){nextField(e,"sim_entrada")}} placeholder="Nome do cliente" autoFocus/>
        </div>

        {/* Entrada */}
        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid rgba(200,164,92,0.08)"}}>
          <div style={{fontSize:14,fontWeight:600,color:G,marginBottom:8}}>💰 {t.downPay}</div>
          <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
            <input id="sim_entrada" style={Object.assign({},mI,{flex:1,marginBottom:0,fontFamily:numFont})} type="number" value={down} onChange={function(e){setDown(+e.target.value)}} onKeyDown={function(e){nextField(e,"sim_bem_val")}}/>
            <div style={{padding:"10px 14px",background:G+"15",borderRadius:10,fontSize:16,fontWeight:700,color:G,minWidth:55,textAlign:"center",fontFamily:numFont}}>{price>0?((down/price)*100).toFixed(0):"0"}%</div>
          </div>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {[10,20,25,30,40,50].map(function(p){return <span key={p} className="bh" onClick={function(){setDown(Math.round(price*p/100))}} style={{padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:Math.round((down/price)*100)===p?G+"20":"#0a0a09",color:Math.round((down/price)*100)===p?G:"#555",fontFamily:numFont}}>{p}%</span>})}
          </div>
        </div>

        {/* Bem */}
        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid "+(bemVal>0?"rgba(232,169,78,0.15)":"rgba(255,255,255,0.03)")}}>
          <div style={{fontSize:14,fontWeight:600,color:"#E8A94E",marginBottom:8}}>🚗 {t.bem}</div>
          <div style={{display:"flex",gap:8,marginBottom:0}}>
            <div style={{flex:1}}>
              <input id="sim_bem_val" style={Object.assign({},mI,{fontFamily:numFont,marginBottom:4})} type="number" value={bemVal||""} onChange={function(e){setBemVal(+e.target.value)}} onKeyDown={function(e){nextField(e,"sim_bem_desc")}} placeholder="Valor (R$)"/>
            </div>
            <div style={{flex:1}}>
              <input id="sim_bem_desc" style={Object.assign({},mI,{marginBottom:4})} value={bemDesc} onChange={function(e){setBemDesc(e.target.value)}} onKeyDown={function(e){nextField(e,"sim_parcelas_livre")}} placeholder="Descrição (Carro, Terreno...)"/>
            </div>
          </div>
          {bemVal>0&&<div style={{fontSize:13,color:"#E8A94E",fontFamily:numFont}}>Total entrada: {$(totalEntrada)} ({price>0?((totalEntrada/price)*100).toFixed(1):"0"}%)</div>}
        </div>

        {/* Parcelas */}
        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid rgba(91,143,212,0.08)"}}>
          <div style={{fontSize:14,fontWeight:600,color:"#5B8FD4",marginBottom:8}}>📅 {t.parcels}</div>
          <div style={{display:"flex",gap:5,marginBottom:8,flexWrap:"wrap",alignItems:"center"}}>
            <span className="bh" onClick={function(){setMonths(0)}} style={{padding:"8px 14px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",background:months===0?"#D45B5B20":"#0a0a09",color:months===0?"#D45B5B":"#555",fontFamily:numFont}}>0x</span>
            {parcOpts.map(function(m){return <span key={m} className="bh" onClick={function(){setMonths(m)}} style={{padding:"8px 14px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",background:months===m?b.color+"20":"#0a0a09",color:months===m?b.color:subColor,fontFamily:numFont}}>{m}x</span>})}
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <input id="sim_parcelas_livre" style={Object.assign({},mI,{flex:1,marginBottom:0,fontFamily:numFont})} type="number" min="0" max={maxParcelas} value={months} onChange={function(e){var v=Math.min(+e.target.value,maxParcelas);setMonths(Math.max(0,v))}} onKeyDown={function(e){nextField(e,"sim_taxa")}} placeholder="Nº de parcelas"/>
            <span style={{fontSize:12,color:subColor,whiteSpace:"nowrap"}}>máx {maxParcelas}</span>
          </div>
          {months===0&&<div style={{marginTop:8,padding:"8px 12px",background:"rgba(213,91,91,0.06)",borderRadius:8,fontSize:13,color:"#D45B5B"}}>{t.noParcels}</div>}
          {months>0&&saldoParcelas>0&&<div style={{marginTop:8,fontSize:15,fontWeight:600,color:"#4CAF7D",fontFamily:numFont}}>{months}x de {$(pmt)}{$eq(pmt)}</div>}
        </div>

        {/* Taxa */}
        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid "+borderColor}}>
          <div style={{fontSize:14,fontWeight:600,color:textColor,marginBottom:8}}>📈 {t.rateLabel} & {t.correction}</div>
          <div style={{display:"flex",gap:8}}>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:subColor,marginBottom:4}}>Taxa mensal (%)</div>
              <input id="sim_taxa" style={Object.assign({},mI,{fontFamily:numFont,marginBottom:0})} type="number" step="0.01" value={rate} onChange={function(e){setRate(+e.target.value)}} onKeyDown={function(e){if(e.key==="Enter")e.preventDefault()}}/>
            </div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,color:subColor,marginBottom:4}}>Índice</div>
              <div style={{padding:"13px 16px",background:isDark?"#1a1a19":"#EFEBE4",borderRadius:10,fontSize:15,color:textColor,border:"1px solid "+borderColor}}>{indice}</div>
            </div>
          </div>
        </div>

        {/* Balão */}
        <div style={{background:cardBg,borderRadius:14,padding:16,marginBottom:12,border:"1px solid "+(balaoFreq!=="none"?"rgba(196,112,112,0.15)":"rgba(255,255,255,0.03)")}}>
          <div style={{fontSize:14,fontWeight:600,color:"#C47070",marginBottom:10}}>🎈 {t.balloon}</div>
          <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
            {[{v:"none",l:t.none},{v:"trimestral",l:t.quarterly},{v:"semestral",l:t.semiannual},{v:"anual",l:t.annual}].map(function(o){
              return <span key={o.v} className="bh" onClick={function(){setBalaoFreq(o.v)}} style={{padding:"8px 14px",borderRadius:10,fontSize:14,fontWeight:600,cursor:"pointer",background:balaoFreq===o.v?"#C4707020":"#0a0a09",color:balaoFreq===o.v?"#C47070":"#555"}}>{o.l}</span>
            })}
          </div>
          {balaoFreq!=="none" && <div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <span className="bh" onClick={function(){setBalaoMode("pct")}} style={{padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:balaoMode==="pct"?"#C4707020":"#0a0a09",color:balaoMode==="pct"?"#C47070":"#555"}}>{t.pctBalance}</span>
              <span className="bh" onClick={function(){setBalaoMode("fixo")}} style={{padding:"7px 14px",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer",background:balaoMode==="fixo"?"#C4707020":"#0a0a09",color:balaoMode==="fixo"?"#C47070":"#555"}}>{t.fixedVal}</span>
            </div>
            {balaoMode==="pct"?<input style={Object.assign({},mI,{fontFamily:numFont})} type="number" step="0.5" value={balaoPct} onChange={function(e){setBalaoPct(+e.target.value)}} placeholder="% do saldo"/>:<input style={Object.assign({},mI,{fontFamily:numFont})} type="number" value={balaoFixo} onChange={function(e){setBalaoFixo(+e.target.value)}} placeholder="Valor do balão"/>}
            <div style={{padding:"10px 14px",background:"rgba(196,112,112,0.06)",borderRadius:10,fontSize:14,color:"#C47070",fontFamily:numFont,border:"1px solid rgba(196,112,112,0.1)"}}>
              {numBaloes}x de {$(balaoValor)} = <strong>{$(totalBaloes)}</strong>{$eq(totalBaloes)}
            </div>
          </div>}
        </div>

        {/* ═══ RESUMO ═══ */}
        <div style={{background:"linear-gradient(135deg,#111110,#0d0d0c)",borderRadius:16,padding:18,marginTop:8,border:"1px solid "+borderColor}}>
          <div style={{fontSize:12,textTransform:"uppercase",letterSpacing:2,color:subColor,marginBottom:14,textAlign:"center"}}>Resumo da Proposta {showUsd&&<span style={{color:"#4CAF7D"}}>(USD)</span>}</div>
          {clientName&&<div style={{textAlign:"center",fontSize:15,fontWeight:600,color:textColor,marginBottom:12}}>👤 {clientName}</div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{t.downPay}</div><div style={{fontSize:18,fontWeight:600,color:G,fontFamily:numFont}}>{$(down)}</div>{showUsd&&<div style={{fontSize:12,color:subColor,fontFamily:numFont}}>{fmt(down)}</div>}</div>
            {bemVal>0 && <div><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>Bem ({bemDesc||"Outro"})</div><div style={{fontSize:18,fontWeight:600,color:"#E8A94E",fontFamily:numFont}}>{$(bemVal)}</div></div>}
            <div><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{t.balance}</div><div style={{fontSize:18,fontWeight:600,color:"#7A9EC2",fontFamily:numFont}}>{$(saldo)}</div></div>
            {months>0&&<div style={{gridColumn:numBaloes>0?"1":"1/-1"}}><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{t.monthly} ({months}x)</div><div style={{fontSize:28,fontWeight:600,color:"#4CAF7D",fontFamily:numFont}}>{$(pmt)}</div>{showUsd&&<div style={{fontSize:13,color:subColor,fontFamily:numFont}}>{fmt(pmt)}</div>}</div>}
            {months===0&&<div style={{gridColumn:"1/-1"}}><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{t.parcels}</div><div style={{fontSize:18,fontWeight:600,color:"#D45B5B",fontFamily:numFont}}>{t.noParcels}</div></div>}
            {numBaloes>0 && <div><div style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>Balão ({numBaloes}x)</div><div style={{fontSize:18,fontWeight:600,color:"#C47070",fontFamily:numFont}}>{$(balaoValor)}</div></div>}
          </div>
          <div style={{height:1,background:"rgba(255,255,255,0.04)",margin:"12px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={{fontSize:12,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{t.total}</span>
            <span style={{fontSize:22,fontWeight:600,color:textColor,fontFamily:numFont}}>{$(totalPago)}</span>
          </div>
          {showUsd&&<div style={{textAlign:"right",fontSize:13,color:subColor,fontFamily:numFont}}>{fmt(totalPago)}</div>}
          <div style={{fontSize:12,color:subColor,marginTop:6,textAlign:"center"}}>{rate>0?"Taxa: "+rate+"% a.m. · ":"Sem juros · "}Correção: {indice}</div>
          {/* USD Disclaimer */}
          {showUsd&&<div style={{marginTop:10,padding:"10px 14px",background:"rgba(232,169,78,0.06)",borderRadius:10,fontSize:12,color:"#E8A94E",lineHeight:1.6,border:"1px solid rgba(232,169,78,0.1)",textAlign:"center"}}>{usdDisclaimer}</div>}
          {/* Discount Alert */}
          {totalPago<price && <div style={{marginTop:12,padding:14,background:"rgba(232,169,78,0.06)",borderRadius:12,border:"1px solid rgba(232,169,78,0.15)"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#E8A94E",marginBottom:4}}>⚠️ {t.belowTable}</div>
            <div style={{fontSize:13,color:textColor,marginBottom:6,fontFamily:numFont}}>Valor tabela: {$(price)} → Proposta: {$(totalPago)}</div>
            <div style={{fontSize:15,fontWeight:700,color:"#D45B5B",fontFamily:numFont}}>{t.discountReq}: {((1-totalPago/price)*100).toFixed(1)}% ({$(price-totalPago)})</div>
            <div style={{fontSize:12,color:"#E8A94E",marginTop:8,padding:"8px 12px",background:"rgba(232,169,78,0.06)",borderRadius:8,textAlign:"center"}}>📋 {t.boardApproval}</div>
          </div>}
        </div>

        {/* ═══ ACTION BUTTONS ═══ */}
        <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
          <button className="bh" onClick={function(){window.open("https://wa.me/"+waNum+"?text="+encodeURIComponent(waText),"_blank")}} style={{width:"100%",padding:"15px",borderRadius:12,fontSize:17,fontWeight:700,background:"linear-gradient(135deg,#25D366,#128C7E)",color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 6px 24px rgba(37,211,102,0.25)"}}><WaIcon size={20}/> {t.sendProp}</button>
          <button className="bh" onClick={exportProposalPdf} style={{width:"100%",padding:"14px",borderRadius:12,fontSize:16,fontWeight:600,background:b.color+"15",color:b.color,border:"1px solid "+b.color+"25",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🖨️ {t.genPdf}</button>
        </div>
        <button style={Object.assign({},mC,{marginTop:8})} onClick={function(){setSimUnit(null)}}>{t.close}</button>
      </div>
    );
  }
}

var root = ReactDOM.createRoot(document.getElementById('root'));
try {
  root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
} catch(e) {
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#D45B5B;font-family:monospace"><h2>Error:</h2><pre>'+e.message+'</pre><pre>'+e.stack+'</pre></div>';
}
window.onerror = function(msg,url,line,col,err){
  document.getElementById('root').innerHTML = '<div style="padding:40px;color:#D45B5B;font-family:monospace;background:#111;min-height:100vh"><h2>JS Error:</h2><p>'+msg+'</p><p>Line: '+line+' Col: '+col+'</p><pre>'+(err?err.stack:'')+'</pre></div>';
};
</script>
</body>
</html>

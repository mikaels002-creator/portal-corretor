  var go = function(id){setSel(id);setVw("detail");setDtab("table");setFilter("all");setSearch("");setCompare([])};

    return {
      bldCount:actB.length,
      totalU:actU.length,
      avail:actU.filter(function(u){return u.status==="available"}).length,
      reserved:actU.filter(function(u){return u.status==="reserved"}).length,
      sold:actU.filter(function(u){return u.status==="sold"}).length,
      totalVal:actU.reduce(function(s,u){var b=actB.find(function(x){return x.id===u.building_id});return s+(b?cp(u,b):u.base_price)},0)
    };

  var refreshNotices = async function(){var d=await DB.loadNotices();setAllNotices(d)};
  var refreshBrokers = async function(){var d=await DB.loadBrokers();setBrokers(d)};

  // ═══ LOADING SCREEN ═══
  if(!rdy) return(
    <div style={{fontFamily:"'DM Sans',system-ui,sans-serif",background:"#0a0a09",color:"#9A9590",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14}}>
      <div style={{width:60,height:60,borderRadius:16,background:"linear-gradient(135deg,#C8A45C20,#C8A45C08)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,animation:"p 1.5s infinite"}}>🏢</div>
      <div style={{fontSize:14,fontWeight:500}}>Conectando ao servidor...</div>
      <div style={{width:120,height:3,borderRadius:2,background:"#1a1a19",overflow:"hidden"}}><div style={{width:"60%",height:"100%",background:"linear-gradient(90deg,transparent,#C8A45C,transparent)",animation:"shimmer 1.5s infinite",backgroundSize:"200% 100%"}}/></div>
      <style>{"@keyframes p{0%,100%{opacity:1}50%{opacity:.3}}@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}"}</style>
    </div>
  );

  // ═══ HOME VIEW ═══

      <div style={{padding:"20px clamp(14px, 4vw, 48px)"}}>

          <div style={{fontSize:12,color:"#7A7570",marginTop:4}}>{vis.length} {lang==="es"?"activos":"ativos"}</div>
        </div>
        <div className="bld-grid">
        {vis.map(function(b,idx){

            <div key={b.id} onClick={function(){go(b.id)}} className="ch au" style={{background:"#111110",borderRadius:16,overflow:"hidden",border:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",animationDelay:idx*100+"ms"}}>
              <div style={{height:180,background:cover?"url("+cover+") center/cover no-repeat":b.gradient,position:"relative"}}>
                {!cover && <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",fontSize:40}}>{b.emoji}</div>}
                <div style={{position:"absolute",inset:0,background:"linear-gradient(transparent 30%,rgba(10,10,9,0.9))"}}/>
                <div style={{position:"absolute",top:12,right:12,padding:"5px 12px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(0,0,0,0.5)",color:"#fff",backdropFilter:"blur(8px)",border:"1px solid rgba(255,255,255,0.08)",letterSpacing:.5}}>{b.tag}</div>
                {!b.active && adm && <div style={{position:"absolute",top:12,left:12,padding:"5px 12px",borderRadius:20,fontSize:10,fontWeight:600,background:"rgba(213,91,91,0.8)",color:"#fff"}}>Oculto</div>}
                <div style={{position:"absolute",bottom:16,left:18,right:18}}>
                  <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:22,fontWeight:500,lineHeight:1.15,textShadow:"0 2px 12px rgba(0,0,0,0.6)"}}>{b.name}</div>
                </div>
              </div>
              <div style={{padding:"16px 18px 18px"}}>
                <div style={{fontSize:12,color:"#7A7570",marginBottom:12,lineHeight:1.5,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{b.subtitle}</div>

                  </div>

                    <span style={{fontSize:11,color:"#7A7570"}}>{a}/{units.length} disp.</span>
                    <span style={{fontSize:11,color:G}}>→</span>
                  </div>
                </div>
              </div>
            </div>
          );
        })}
        </div>
      </div>
    );
  }

          })}

            <div style={{display:"flex",alignItems:"baseline",gap:6}}>
              <span style={{fontSize:15,fontWeight:700,color:G}}>{fmt(bld.cub_current)}</span>

            <span onClick={function(){setShowUsd(!showUsd)}} style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:700,cursor:"pointer",background:showUsd?"rgba(76,175,125,0.15)":"rgba(91,143,212,0.1)",color:showUsd?"#4CAF7D":"#5B8FD4",border:showUsd?"1px solid rgba(76,175,125,0.3)":"1px solid rgba(91,143,212,0.3)",display:"inline-flex",alignItems:"center",gap:5}}>{showUsd?"🇧🇷 R$ "+t.showBrl:"🇺🇸 $ "+t.showUsd}</span>

          <div style={{overflowX:"auto",borderRadius:14,border:"1px solid rgba(255,255,255,0.03)",overflow:"hidden"}}>

  var printBld = function(bid){
    var b=buildings.find(function(x){return x.id===bid});if(!b)return;
    var units=getUnits(bid);
    var logo=cfg.report_logo?"<img src='"+cfg.report_logo+"' style='max-height:50px;max-width:180px;margin-bottom:12px'/>":"";
    var currency=showUsd?"USD":"BRL";
    var usdWarn=showUsd?"<div style='margin:12px 0;padding:10px;background:#fff3cd;border:1px solid #ffc107;border-radius:6px;font-size:10px;color:#856404;text-align:center'>⚠️ Valores em USD são referência. Cotação confirmada no dia da transação. Contratos em BRL. Ref: R$ "+getUsdRate().toFixed(2)+"</div>":"";
    var rows=units.map(function(u){var p=cp(u,b);var showPrice=u.status==="available";return "<tr><td>"+u.name+"</td><td>"+u.area+"m²</td><td style='font-weight:600;color:#2e7d52'>"+(showPrice&&p>0?fmtV(p):"—")+"</td><td style='color:"+sC[u.status]+";font-weight:600'>"+sL[u.status]+"</td></tr>"}).join("");
    var html="<html><head><meta charset='UTF-8'><title>"+b.name+"</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Helvetica,sans-serif;padding:36px;color:#1a1a1a;max-width:780px;margin:0 auto}h1{font-size:24px;margin-bottom:4px}h2{font-size:12px;color:#888;font-weight:400;margin-bottom:18px}table{width:100%;border-collapse:collapse;margin-top:8px}th{background:#f5f0e8;padding:10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid #ddd}td{padding:10px;border-bottom:1px solid #eee;font-size:12px}.ft{margin-top:24px;padding-top:12px;border-top:1px solid #ddd;font-size:9px;color:#999;text-align:center}.badge{display:inline-block;padding:4px 12px;border-radius:16px;font-size:10px;font-weight:700;color:#fff;margin-bottom:12px}.cub{font-size:11px;color:#666;margin-bottom:10px;padding:8px 10px;background:#f8f6f2;border-radius:5px}</style></head><body>"+logo+"<h1>"+b.name+"</h1><h2>"+b.subtitle+"</h2><div class='badge' style='background:"+b.color+"'>"+(b.status==="ready"?"Pronto":"Em Construção — "+b.construction_pct+"%")+"</div><div class='cub'>CUB/SC: "+fmt(b.cub_base)+" → "+fmt(b.cub_current)+" ("+((b.cub_current/b.cub_base-1)*100).toFixed(2)+"%)</div>"+usdWarn+"<table><thead><tr><th>Unid.</th><th>Área</th><th>Valor"+(showUsd?" (USD)":"")+"</th><th>Status</th></tr></thead><tbody>"+rows+"</tbody></table><div class='ft'>MK Realty & D&SS Incorporação | "+CT.email+" | "+CT.phone+"<br>Gerado em "+new Date().toLocaleDateString("pt-BR")+"</div></body></html>";
    var w=window.open("","_blank");if(w){w.document.write(html);w.document.close();setTimeout(function(){w.print()},500)}
  };

  // ═══ BACKUP / EXPORT ═══
  var exportBackup = async function(){
    msg("Exportando dados...");
    var data={buildings:buildings,units:allUnits,photos:allPhotos,plants:allPlants,documents:allDocs,notices:allNotices,brokers:brokers,config:cfg,exportDate:new Date().toISOString()};
    var json=JSON.stringify(data,null,2);
    var blob=new Blob([json],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="portal-backup-"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    msg("Backup exportado!");
  };

  // ═══ EXCEL EXPORT ═══
  var exportExcel = function(bid){
    var b=buildings.find(function(x){return x.id===bid});if(!b)return;
    var units=getUnits(bid);
    var csv="Unidade;Área (m²);Preço Base;Valor Corrigido;Status\n";
    units.forEach(function(u){var p=cp(u,b);var showPrice=u.status==="available";csv+=u.name+";"+u.area+";"+(showPrice?u.base_price:"-")+";"+(showPrice?p:"-")+";"+sL[u.status]+"\n"});
    var blob=new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"});

  // ═══ IMPORT PDF ═══
  function ImportPdfM(){
    var bid=mdl.bid;
    var b=buildings.find(function(x){return x.id===bid});
    var _step=useState("upload");var step=_step[0];var setStep=_step[1];
    var _rawText=useState("");var rawText=_rawText[0];var setRawText=_rawText[1];
    var _parsed=useState([]);var parsed=_parsed[0];var setParsed=_parsed[1];
    var _loading=useState(false);var loading=_loading[0];var setLoading=_loading[1];
    var _progress=useState("");var progress=_progress[0];var setProgress=_progress[1];

    var extractPdf=async function(file){
      setLoading(true);setProgress("Lendo PDF...");
      try{
        var arrayBuf=await file.arrayBuffer();
        var pdf=await window.pdfjsLib.getDocument({data:arrayBuf}).promise;
        var allText="";
        for(var i=1;i<=pdf.numPages;i++){
          setProgress("Lendo página "+i+" de "+pdf.numPages+"...");
          var page=await pdf.getPage(i);
          var tc=await page.getTextContent();
          var items=tc.items;
          // Group text by Y position to reconstruct rows
          var rows={};
          items.forEach(function(item){
            var y=Math.round(item.transform[5]);
            if(!rows[y])rows[y]=[];
            rows[y].push({x:item.transform[4],text:item.str});
          });
          // Sort by Y descending (PDF y-axis is bottom-up) then X ascending
          var sortedYs=Object.keys(rows).map(Number).sort(function(a,b){return b-a});
          sortedYs.forEach(function(y){
            var row=rows[y].sort(function(a,b){return a.x-b.x});
            var line=row.map(function(r){return r.text}).join(" | ");
            allText+=line+"\n";
          });
          allText+="\n--- Página "+i+" ---\n\n";
        }
        setRawText(allText);
        setProgress("Analisando dados...");
        // Parse the text
        var lines=allText.split("\n").filter(function(l){return l.trim().length>3});
        var units=[];
        lines.forEach(function(line){
          // Try to find unit data in each line
          var parts=line.split("|").map(function(p){return p.trim()});
          if(parts.length<2)return;
          // Look for patterns
          var unitName="";var area=0;var price=0;
          parts.forEach(function(p){
            // Unit name: short text starting with number or letter combo like "101", "Loja 01", "Ap 301"
            if(!unitName&&/^[A-Za-z]*\s*\d+/.test(p)&&p.length<20){unitName=p}
            // Area: number with decimals less than 1000, or explicit m²
            var areaMatch=p.match(/(\d+[.,]\d+)\s*m[²2]?/i);
            if(!areaMatch) areaMatch=p.match(/^(\d+[.,]\d+)$/);
            if(areaMatch&&!area){
              var v=parseFloat(areaMatch[1].replace(",","."));
              if(v>10&&v<2000) area=v;
            }
            // Price: large number > 50000
            var cleaned=p.replace(/[R$\s]/g,"").replace(/\./g,"").replace(",",".");
            var priceVal=parseFloat(cleaned);
            if(priceVal>50000&&!price) price=priceVal;
          });
          // Also try to find price in Brazilian format: 1.234.567,89
          if(!price){
            var brPrice=line.match(/(\d{1,3}(?:\.\d{3})+[,]\d{2})/);
            if(brPrice){
              var pv=parseFloat(brPrice[1].replace(/\./g,"").replace(",","."));
              if(pv>50000) price=pv;
            }
          }
          if(unitName&&(area>0||price>0)){
            // Check duplicate
            var dup=units.find(function(u){return u.name===unitName});
            if(!dup) units.push({name:unitName,area:area,price:price,include:true});
          }
        });
        setParsed(units);
        setStep(units.length>0?"review":"raw");
        setProgress(units.length+" unidades encontradas");
      }catch(e){
        setProgress("Erro ao ler PDF: "+e.message);
        console.log(e);
        setStep("raw");
      }
      setLoading(false);
    };

    // Upload step
    if(step==="upload") return <div>
      <div style={mT}>📥 Importar Tabela de Vendas</div>
      <div style={{fontSize:12,color:"#555",marginBottom:14}}>{b?b.name:""} — O portal vai ler o PDF e extrair as unidades automaticamente.</div>
      <label className="bh" style={{display:"block",padding:"32px 20px",border:"2px dashed rgba(91,143,212,0.3)",borderRadius:14,textAlign:"center",cursor:"pointer",background:"rgba(91,143,212,0.04)",marginBottom:12}}>
        <input type="file" accept=".pdf" style={{display:"none"}} onChange={function(e){
          var file=e.target.files&&e.target.files[0];
          if(file) extractPdf(file);
        }}/>
        <div style={{fontSize:32,marginBottom:8}}>📄</div>
        <div style={{fontSize:14,fontWeight:600,color:"#5B8FD4"}}>Toque para selecionar o PDF</div>
        <div style={{fontSize:11,color:"#555",marginTop:6}}>Tabela de vendas em PDF · O sistema vai interpretar automaticamente</div>
      </label>
      {loading&&<div style={{textAlign:"center",padding:12}}>
        <div style={{fontSize:12,color:G}}>{progress}</div>
        <div style={{width:"100%",height:3,background:"#1a1a19",borderRadius:2,marginTop:8,overflow:"hidden"}}><div style={{width:"60%",height:"100%",background:G,animation:"shimmer 1.5s infinite",backgroundSize:"200% 100%"}}/></div>
      </div>}
      <button style={mC} onClick={function(){setMdl(null)}}>Cancelar</button>
    </div>;

    // Raw text view (fallback if parsing fails)
    if(step==="raw") return <div>
      <div style={mT}>📄 Texto Extraído</div>
      <div style={{fontSize:11,color:"#E8A94E",marginBottom:8}}>O sistema não conseguiu interpretar a tabela automaticamente. Aqui está o texto bruto extraído:</div>
      <textarea style={Object.assign({},mI,{minHeight:200,fontSize:11,fontFamily:"monospace",whiteSpace:"pre-wrap"})} value={rawText} readOnly/>
      <div style={{fontSize:11,color:"#555",marginBottom:8}}>Você pode adicionar as unidades manualmente usando o botão "＋ Unid." no empreendimento.</div>
      <button className="bh" style={mP("#5B8FD4")} onClick={function(){setStep("upload")}}>Tentar Outro PDF</button>
      <button style={mC} onClick={function(){setMdl(null)}}>Fechar</button>
    </div>;

    // Review step
    if(step==="review") return <div>
      <div style={mT}>✅ {parsed.filter(function(u){return u.include}).length} Unidades Encontradas</div>
      <div style={{fontSize:11,color:"#555",marginBottom:12}}>Revise os dados abaixo. Desmarque as unidades que não deseja importar. Você pode editar nome, área e preço.</div>
      <div style={{maxHeight:350,overflow:"auto",marginBottom:12}}>
        {parsed.map(function(u,i){
          return <div key={i} style={{display:"flex",gap:6,alignItems:"center",padding:"8px 10px",background:u.include?"#111110":"#0a0a09",borderRadius:10,marginBottom:4,border:"1px solid rgba(255,255,255,0.03)",opacity:u.include?1:0.4}}>
            <input type="checkbox" checked={u.include} onChange={function(){var nw=parsed.map(function(x,j){return j===i?Object.assign({},x,{include:!x.include}):x});setParsed(nw)}} style={{accentColor:G}}/>
            <input value={u.name} onChange={function(e){var nw=parsed.map(function(x,j){return j===i?Object.assign({},x,{name:e.target.value}):x});setParsed(nw)}} style={{width:70,padding:"4px 6px",background:"#1a1a19",border:"1px solid rgba(255,255,255,0.04)",borderRadius:5,color:"#F0EBE3",fontSize:12,fontWeight:600}}/>
            <div style={{display:"flex",alignItems:"center",gap:2,flex:1}}>
              <input type="number" value={u.area} onChange={function(e){var nw=parsed.map(function(x,j){return j===i?Object.assign({},x,{area:+e.target.value}):x});setParsed(nw)}} style={{width:55,padding:"4px 6px",background:"#1a1a19",border:"1px solid rgba(255,255,255,0.04)",borderRadius:5,color:"#F0EBE3",fontSize:11}}/>
              <span style={{fontSize:10,color:"#555"}}>m²</span>
            </div>
            <input type="number" value={u.price} onChange={function(e){var nw=parsed.map(function(x,j){return j===i?Object.assign({},x,{price:+e.target.value}):x});setParsed(nw)}} style={{width:90,padding:"4px 6px",background:"#1a1a19",border:"1px solid rgba(255,255,255,0.04)",borderRadius:5,color:"#4CAF7D",fontSize:11,fontWeight:600}}/>
          </div>;
        })}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:8}}>
        <button className="bh" onClick={function(){setStep("raw")}} style={mbtn("#7A9EC2")}>📄 Ver Texto</button>
        <button className="bh" onClick={function(){setStep("upload")}} style={mbtn("#E8A94E")}>📥 Outro PDF</button>
      </div>
      <button className="bh" style={mP("#4CAF7D")} onClick={async function(){
        var toImport=parsed.filter(function(u){return u.include&&u.name.trim()});
        if(toImport.length===0){msg("Nenhuma unidade selecionada");return}
        setLoading(true);setProgress("Salvando "+toImport.length+" unidades...");
        for(var i=0;i<toImport.length;i++){
          var u=toImport[i];
          setProgress("Salvando "+(i+1)+" de "+toImport.length+"...");
          await DB.saveUnit({id:bid+"-"+Date.now()+"-"+i,building_id:bid,name:u.name,area:u.area,base_price:u.price,status:"available",history:"[]",sort_order:i});
        }
        await refreshUnits();setLoading(false);setMdl(null);

        <div style={{fontSize:12,fontWeight:600,color:G,marginBottom:8}}>📅 Parcelas</div>
        <div style={{display:"flex",gap:5,marginBottom:10,flexWrap:"wrap"}}>
          {parcOpts.map(function(m){return <span key={m} className="bh" onClick={function(){setMonths(m)}} style={{padding:"8px 14px",borderRadius:10,fontSize:12,fontWeight:600,cursor:"pointer",background:months===m?b.color+"20":"#111110",color:months===m?b.color:"#555",border:months===m?"1px solid "+b.color+"30":"1px solid rgba(255,255,255,0.03)"}}>{m}x</span>})}
        </div>

        {rate>0||true?<div style={{marginBottom:10}}><L>Taxa Mensal (%)</L><input style={mI} type="number" step="0.01" value={rate} onChange={function(e){setRate(+e.target.value)}}/></div>:null}

        {/* Balão */}
        <details style={{marginBottom:12}}>
          <summary style={{fontSize:12,fontWeight:600,color:G,cursor:"pointer",marginBottom:6}}>🎈 Parcelas Balão (opcional)</summary>
          <div style={{display:"flex",gap:5,marginBottom:8}}>
            {[{v:"none",l:"Nenhum"},{v:"trimestral",l:"Trimestral"},{v:"semestral",l:"Semestral"},{v:"anual",l:"Anual"}].map(function(o){
              return <span key={o.v} className="bh" onClick={function(){setBalaoFreq(o.v)}} style={{padding:"6px 12px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",background:balaoFreq===o.v?b.color+"20":"#111110",color:balaoFreq===o.v?b.color:"#555"}}>{o.l}</span>
            })}
          </div>
          {balaoFreq!=="none" && <div>
            <div style={{display:"flex",gap:4,marginBottom:8}}>
              <span className="bh" onClick={function(){setBalaoMode("pct")}} style={{padding:"5px 12px",borderRadius:6,fontSize:11,cursor:"pointer",background:balaoMode==="pct"?b.color+"20":"#111110",color:balaoMode==="pct"?b.color:"#555"}}>% do saldo</span>
              <span className="bh" onClick={function(){setBalaoMode("fixo")}} style={{padding:"5px 12px",borderRadius:6,fontSize:11,cursor:"pointer",background:balaoMode==="fixo"?b.color+"20":"#111110",color:balaoMode==="fixo"?b.color:"#555"}}>Valor fixo</span>
            </div>
            {balaoMode==="pct"?<input style={mI} type="number" step="0.5" value={balaoPct} onChange={function(e){setBalaoPct(+e.target.value)}}/>:<input style={mI} type="number" value={balaoFixo} onChange={function(e){setBalaoFixo(+e.target.value)}}/>}
            <div style={{fontSize:11,color:"#555"}}>{numBaloes}x de {fmt(balaoValor)} = {fmt(totalBaloes)}</div>
          </div>}
        </details>

        {/* ═══ RESUMO ═══ */}
        <div style={{background:"linear-gradient(135deg,#111110,#0d0d0c)",borderRadius:16,padding:18,marginTop:8,border:"1px solid rgba(255,255,255,0.04)"}}>
          <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:2,color:"#555",marginBottom:14,textAlign:"center"}}>Resumo da Proposta</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Entrada</div><div style={{fontSize:16,fontWeight:600,color:G,fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{fmt(down)}</div></div>
            {bemVal>0 && <div><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Bem ({bemDesc||"Outro"})</div><div style={{fontSize:16,fontWeight:600,color:"#E8A94E",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{fmt(bemVal)}</div></div>}
            <div><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Saldo</div><div style={{fontSize:16,fontWeight:600,color:"#7A9EC2",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{fmt(saldo)}</div></div>
            <div style={{gridColumn:numBaloes>0?"1":"1/-1"}}><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Mensal ({months}x)</div><div style={{fontSize:28,fontWeight:600,color:"#4CAF7D",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{fmt(pmt)}</div></div>
            {numBaloes>0 && <div><div style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Balão ({numBaloes}x)</div><div style={{fontSize:16,fontWeight:600,color:"#C47070",fontFamily:"'Cormorant Garamond',Georgia,serif"}}>{fmt(balaoValor)}</div></div>}
          </div>
          <div style={{height:1,background:"rgba(255,255,255,0.04)",margin:"12px 0"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
            <span style={{fontSize:9,color:"#555",textTransform:"uppercase",letterSpacing:1}}>Total Geral</span>
            <span style={{fontSize:18,fontWeight:600,color:"#F0EBE3"}}>{fmt(totalPago)}</span>
          </div>
          <div style={{fontSize:10,color:"#555",marginTop:6,textAlign:"center"}}>{rate>0?"Taxa: "+rate+"% a.m. · ":"Sem juros · "}Correção: {indice}</div>
        </div>

        {/* ═══ ACTION BUTTONS ═══ */}
        <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:8}}>
          <button className="bh" onClick={function(){window.open("https://wa.me/"+waNum+"?text="+encodeURIComponent(waText),"_blank")}} style={{width:"100%",padding:"15px",borderRadius:12,fontSize:15,fontWeight:700,background:"linear-gradient(135deg,#25D366,#128C7E)",color:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,boxShadow:"0 6px 24px rgba(37,211,102,0.25)"}}><WaIcon size={20}/> Enviar Proposta via WhatsApp</button>
          <button className="bh" onClick={exportProposalPdf} style={{width:"100%",padding:"14px",borderRadius:12,fontSize:14,fontWeight:600,background:b.color+"15",color:b.color,border:"1px solid "+b.color+"25",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>🖨️ Gerar Proposta em PDF</button>
        </div>
        <button style={Object.assign({},mC,{marginTop:8})} onClick={function(){setSimUnit(null)}}>{t.close}</button>
      </div>
    );
  }
}

var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(React.StrictMode, null, React.createElement(App)));
</script>
</body>
</html>

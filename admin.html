<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Portal do Corretor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body{background:#08080a;color:#E8E4DD;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}
body.light{background:#F5F2ED;color:#1a1a19}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bh{transition:all .15s;cursor:pointer}
.bh:hover{opacity:.85;transform:translateY(-1px)}
input,select,textarea{font-family:inherit}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes typing{0%{opacity:.3}50%{opacity:1}100%{opacity:.3}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes work{0%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}100%{transform:rotate(-2deg)}}
.office-desk{position:relative;transition:all .3s;cursor:pointer}
.office-desk:hover{transform:scale(1.05)}
.office-desk .worker{animation:float 3s ease infinite}
.office-desk.busy .worker{animation:work 1s ease infinite}
@media(max-width:768px){
  body{overflow-x:hidden!important}
  /* Sidebar becomes top bar on mobile */
  .admin-layout{flex-direction:column!important}
  .admin-sidebar{width:100%!important;flex-direction:row!important;padding:10px!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;gap:0!important;border-right:none!important;border-bottom:1px solid rgba(255,255,255,0.06)!important}
  .admin-sidebar>div:first-child{display:none!important} /* Hide header */
  .admin-sidebar>div:last-child{display:none!important} /* Hide user info */
  .admin-nav-items{display:flex!important;flex-direction:row!important;gap:2px!important;overflow-x:auto!important;width:100%!important;padding:0 4px!important}
  .admin-nav-items>div{white-space:nowrap!important;padding:8px 12px!important;font-size:12px!important;min-width:auto!important;border-radius:8px!important}
  /* Main content */
  .admin-main{padding:12px!important;max-height:none!important}
  /* Grids */
  [style*="gridTemplateColumns: 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(3"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(4"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(5"]{grid-template-columns:1fr!important}
  /* KPI cards */
  [style*="fontSize: 32"]{font-size:20px!important}
  [style*="fontSize: 28"]{font-size:18px!important}
  [style*="fontSize: 24"]{font-size:16px!important}
  /* Pipeline columns scroll */
  [style*="gridTemplateColumns: repeat(5"]{display:flex!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;gap:8px!important;padding-bottom:8px!important}
  [style*="gridTemplateColumns: repeat(5"]>div{min-width:200px!important;flex-shrink:0!important}
  /* Tables */
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  /* Fix flex wrapping */
  [style*="display: flex"][style*="gap"]{flex-wrap:wrap!important}
  /* Integrations cards */
  [style*="gridTemplateColumns: 1fr 1fr"]{grid-template-columns:1fr!important}
  /* Landing editor */
  textarea{min-height:80px!important}
  /* Padding fixes */
  [style*="padding: 32px"]{padding:12px!important}
  [style*="padding: 24px 32px"]{padding:12px!important}
  [style*="padding: 20px"]{padding:12px!important}
}
@media(max-width:400px){
  .admin-nav-items>div{padding:6px 8px!important;font-size:11px!important}
  [style*="gridTemplateColumns: 1fr 1fr"]{grid-template-columns:1fr!important}
}
</style>
</head>

<div id="root"></div>
<script type="text/babel">
var {useState,useEffect}=React;
var sb=supabase.createClient('https://zztqlktqevfdxjyzvand.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dHFsa3RxZXZmZHhqeXp2YW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI3NjMsImV4cCI6MjA5MTUwODc2M30.xl4LFZoPDR9q78-y9tcyLgaSSLb_oQFrcm2hjmnb-Mg');
var SUPABASE_URL='https://zztqlktqevfdxjyzvand.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dHFsa3RxZXZmZHhqeXp2YW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI3NjMsImV4cCI6MjA5MTUwODc2M30.xl4LFZoPDR9q78-y9tcyLgaSSLb_oQFrcm2hjmnb-Mg';
var ADMIN_TID="mk"; // Tenant do admin SaaS — configurável
var fmt=function(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})};
var G="#C8A45C";var B="#5B8FD4";var GR="#4CAF7D";var P="#8B6FBF";var R="#D45B5B";var W="#E8A94E";


// ═══ AI BRAIN COMPONENT (standalone) ═══

// ═══ AI BRAIN COMPONENT v2 ═══

function AIBrainView(props){
  var tenants=props.tenants||[];var mrr=props.mrr||0;var ativos=props.ativos||[];var pendentes=props.pendentes||[];
  var dark=props.dark;var msg=props.msg;var cardBg=props.cardBg;var border=props.border;
  var textColor=props.textColor;var subColor=props.subColor;
  var G="#C8A45C";var GR="#4CAF7D";var P="#8B6FBF";var B="#5B8FD4";var R="#D45B5B";var W="#E8A94E";

  var _tab=useState("office");var tab=_tab[0];var setTab=_tab[1];
  var _agents=useState([]);var agents=_agents[0];var setAgents=_agents[1];
  var _sel=useState("brain");var sel=_sel[0];var setSel=_sel[1];
  var _convos=useState({});var convos=_convos[0];var setConvos=_convos[1];
  var _inp=useState("");var inp=_inp[0];var setInp=_inp[1];
  var _busy=useState(false);var busy=_busy[0];var setBusy=_busy[1];
  var _busyAgent=useState("");var busyAgent=_busyAgent[0];var setBusyAgent=_busyAgent[1];
  var _apiKey=useState("");var apiKey=_apiKey[0];var setApiKey=_apiKey[1];
  var _aiModel=useState("claude-opus-4-6");var aiModel=_aiModel[0];var setAiModel=_aiModel[1];
  var _goals=useState([]);var goals=_goals[0];var setGoals=_goals[1];
  var _aiTasks=useState([]);var aiTasks=_aiTasks[0];var setAiTasks=_aiTasks[1];
  var _aiContent=useState([]);var aiContent=_aiContent[0];var setAiContent=_aiContent[1];
  var _workerOn=useState(false);var workerOn=_workerOn[0];var setWorkerOn=_workerOn[1];
  var _activity=useState([]);var activity=_activity[0];var setActivity=_activity[1];
  var _recording=useState(false);var recording=_recording[0];var setRecording=_recording[1];
  var _mediaRec=useState(null);var mediaRec=_mediaRec[0];var setMediaRec=_mediaRec[1];
  var _agentChats=useState([]);var agentChats=_agentChats[0];var setAgentChats=_agentChats[1];
  var _ghToken=useState("");var ghToken=_ghToken[0];var setGhToken=_ghToken[1];
  var _ghUser=useState("");var ghUser=_ghUser[0];var setGhUser=_ghUser[1];
  var _ghRepo=useState("portal-corretor");var ghRepo=_ghRepo[0];var setGhRepo=_ghRepo[1];
  var _archived=useState([]);var archived=_archived[0];var setArchived=_archived[1];
  var chatRef=useRef(null);

  var sysCtx="CONTEXTO SISTEMA Portal do Corretor SaaS. GitHub:"+ghUser+"/"+ghRepo+". Supabase:zztqlktqevfdxjyzvand. "+tenants.length+" clientes, "+ativos.length+" ativos, MRR R$"+mrr+". "+pendentes.length+" pendentes. Voce TEM ACESSO TOTAL. REGRA CRITICA: Quando precisar de outro agente, use EXATAMENTE este formato em uma linha separada: CHAMAR:[slug] mensagem. Slugs disponiveis: brain,mkt,sales,finance,tech. Exemplo: CHAMAR:[mkt] crie 3 posts para instagram. SEMPRE use CHAMAR quando a tarefa envolve outra area. ";

  var loadAll2=async function(){
    var r1=await sb.from("ai_agents").select("*").eq("tenant_id",ADMIN_TID).eq("ativo",true).order("ordem");setAgents(r1.data||[]);
    var r2=await sb.from("config_whatsapp").select("chave,valor").in("chave",["anthropic_api_key","ai_model","ai_worker_active","github_token","github_user","github_repo"]).eq("tenant_id",ADMIN_TID);
    (r2.data||[]).forEach(function(c){var v=String(c.valor||"").replace(/^"|"$/g,"");
      if(c.chave==="anthropic_api_key"&&v.startsWith("sk-"))setApiKey(v);
      if(c.chave==="ai_model"&&v.startsWith("claude"))setAiModel(v);
      if(c.chave==="ai_worker_active")setWorkerOn(v==="true");
      if(c.chave==="github_token")setGhToken(v);
      if(c.chave==="github_user")setGhUser(v);
      if(c.chave==="github_repo")setGhRepo(v);
    });
    var r3=await sb.from("ai_goals").select("*").eq("tenant_id",ADMIN_TID).eq("status","ativo");setGoals(r3.data||[]);
    var r4=await sb.from("ai_tasks").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(30);setAiTasks(r4.data||[]);
    var r5=await sb.from("ai_content").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(20);setAiContent(r5.data||[]);
    var r6=await sb.from("ai_agent_chats").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(30);setAgentChats(r6.data||[]);
    await loadConvo(sel);
  };
  var loadConvo=async function(slug){
    var r=await sb.from("ai_conversations").select("*").eq("agent_slug",slug).eq("tenant_id",ADMIN_TID).order("criado_em").limit(100);
    var c2=Object.assign({},convos);c2[slug]=(r.data||[]).filter(function(m){return!m.metadata||!m.metadata.archived});setConvos(c2);
    setTimeout(function(){if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight},100);
  };
  useEffect(function(){loadAll2()},[]);
  useEffect(function(){setTimeout(function(){if(chatRef.current)chatRef.current.scrollTop=chatRef.current.scrollHeight},150)},[convos,busy]);

  var callAI=async function(sys,messages){
    if(!apiKey)return"Configure API Key em Integracoes";
    try{
      var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:aiModel,max_tokens:4096,system:sys,messages:messages})});
      var d=await r.json();if(d.error)return"Erro: "+(d.error.message||"");
      return d.content?d.content.map(function(c2){return c2.text||""}).join(""):"Erro";
    }catch(e){return"Erro: "+e.message}
  };

  // ═══ CHAMAR PROTOCOL - ROBUST ═══
  var processCommands=async function(agentSlug,txt){
    // Find ALL CHAMAR commands - very flexible regex
    var lines2=txt.split("\n");
    for(var i=0;i<lines2.length;i++){
      var line=lines2[i];
      var m=line.match(/CHAMAR:\s*\[?(\w+)\]?\s+(.*)/i);
      if(m){
        var target=m[1].toLowerCase();var tmsg=m[2].trim();
        var fromAgent=agents.find(function(a){return a.slug===agentSlug});
        var toAgent=agents.find(function(a){return a.slug===target});
        if(toAgent){
          setActivity(activity.concat([{agent:fromAgent?fromAgent.nome:"?",action:"Chamou "+toAgent.nome+": "+tmsg.substring(0,40),ts:Date.now(),color:fromAgent?fromAgent.cor:G}]));
          await sb.from("ai_agent_chats").insert({from_agent:agentSlug,to_agent:target,content:tmsg,tenant_id:ADMIN_TID});
          // ACTUALLY send to the target agent
          await sendMsg2(target,"[Solicitacao de "+(fromAgent?fromAgent.nome:"?")+"] "+tmsg,true);
        }
      }
      // EXECUTAR_FIX
      var fx=line.match(/EXECUTAR_FIX:\s*\[?(\w+\.\w+)\]?\s*:::\s*(.*?)\s*:::\s*(.*)/);
      if(fx&&ghToken){
        try{
          var gf=await fetch("https://api.github.com/repos/"+ghUser+"/"+ghRepo+"/contents/"+fx[1],{headers:{"Authorization":"token "+ghToken}}).then(function(r){return r.json()});
          if(gf.content){
            var decoded=atob(gf.content.replace(/\n/g,""));
            if(decoded.includes(fx[2])){
              var newC=decoded.replace(fx[2],fx[3]);
              await fetch("https://api.github.com/repos/"+ghUser+"/"+ghRepo+"/contents/"+fx[1],{method:"PUT",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({message:"[AI Fix] "+fx[1],content:btoa(unescape(encodeURIComponent(newC))),sha:gf.sha})});
              setActivity(activity.concat([{agent:"Dev",action:"Fix aplicado: "+fx[1],ts:Date.now(),color:GR}]));
            }
          }
        }catch(e){}
      }
    }
  };

  // ═══ SEND MESSAGE ═══
  var sendMsg2=async function(agentSlug,text,isAutoCall){
    if(!text||!text.trim())return;
    if(busy&&!isAutoCall)return;
    var agent=agents.find(function(a){return a.slug===agentSlug})||{nome:"?",system_prompt:"",cor:G};
    if(!isAutoCall){setBusy(true);setInp("")}
    setBusyAgent(agentSlug);
    await sb.from("ai_conversations").insert({agent_slug:agentSlug,role:"user",content:text.trim(),tenant_id:ADMIN_TID});
    var msgs2=(convos[agentSlug]||[]).concat([{role:"user",content:text.trim()}]);
    var c2=Object.assign({},convos);c2[agentSlug]=msgs2;setConvos(c2);
    setActivity(activity.concat([{agent:agent.nome,action:"Processando...",ts:Date.now(),color:agent.cor}]));
    // Build context
    var fullSys=sysCtx+(agent.system_prompt||"")+(agent.treinamento?"\nTREINAMENTO:\n"+agent.treinamento:"");
    var apiMsgs=msgs2.map(function(m){return{role:m.role,content:m.content}}).slice(-12);
    var txt=await callAI(fullSys,apiMsgs);
    await sb.from("ai_conversations").insert({agent_slug:agentSlug,role:"assistant",content:txt,tenant_id:ADMIN_TID});
    c2=Object.assign({},convos);c2[agentSlug]=(c2[agentSlug]||[]).concat([{role:"assistant",content:txt}]);setConvos(c2);
    setActivity(activity.concat([{agent:agent.nome,action:"Respondeu",ts:Date.now(),color:agent.cor}]));
    // Process CHAMAR and other commands
    await processCommands(agentSlug,txt);
    // Save content
    if((agentSlug==="mkt"||agentSlug==="sales")&&txt.length>100){
      sb.from("ai_content").insert({equipe:agentSlug,tipo:agentSlug==="mkt"?"post":"script",titulo:text.substring(0,80),conteudo:txt,status:"rascunho",tenant_id:ADMIN_TID}).catch(function(){});
    }
    if(!isAutoCall)setBusy(false);
    setBusyAgent("");
    await loadConvo(agentSlug);
  };

  // Archive conversation
  var archiveConvo=async function(slug){
    await sb.from("ai_conversations").update({metadata:{archived:true}}).eq("agent_slug",slug).eq("tenant_id",ADMIN_TID);
    var c2=Object.assign({},convos);c2[slug]=[];setConvos(c2);
    setArchived(archived.concat([{slug:slug,ts:new Date().toLocaleString("pt-BR")}]));
    msg("Conversa arquivada (usada como aprendizado)");
  };

  // Audio
  var startRec=async function(){try{var stream=await navigator.mediaDevices.getUserMedia({audio:true});var rec=new MediaRecorder(stream);var chunks=[];rec.ondataavailable=function(e){chunks.push(e.data)};rec.onstop=function(){stream.getTracks().forEach(function(t){t.stop()});setRecording(false);sendMsg2(sel,"[Audio recebido] Responda normalmente.")};rec.start();setMediaRec(rec);setRecording(true)}catch(e){msg("Microfone indisponivel")}};
  var stopRec=function(){if(mediaRec&&mediaRec.state==="recording"){mediaRec.stop();setMediaRec(null)}};

  var runWorker=async function(){await sb.rpc("run_ai_worker");await loadAll2();msg("Worker executado")};

  var cur=agents.find(function(a){return a.slug===sel})||{slug:"brain",nome:"Ana",cargo:"Coordenadora",avatar:"\ud83d\udc69\u200d\ud83d\udcbc",cor:"#C8A45C"};
  var curMsgs=convos[sel]||[];

  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
      <div style={{fontSize:22,fontWeight:700,color:textColor}}>{"\ud83e\udde0"} Escritorio Virtual</div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:workerOn?GR:R}}/>
        <span style={{fontSize:10,color:workerOn?GR:subColor}}>{workerOn?"24h":"off"}</span>
        <button className="bh" onClick={async function(){var nv=!workerOn;setWorkerOn(nv);await sb.from("config_whatsapp").delete().eq("chave","ai_worker_active").eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:"ai_worker_active",valor:String(nv),tenant_id:ADMIN_TID});if(nv)runWorker()}} style={{padding:"4px 10px",borderRadius:6,background:workerOn?R+"12":GR+"12",color:workerOn?R:GR,border:"none",fontSize:10,cursor:"pointer"}}>{workerOn?"Parar":"Ligar"}</button>
        <button className="bh" onClick={runWorker} style={{padding:"4px 10px",borderRadius:6,background:G+"12",color:G,border:"none",fontSize:10,cursor:"pointer"}}>Executar</button>
        <select value={aiModel} onChange={async function(e){setAiModel(e.target.value);await sb.from("config_whatsapp").delete().eq("chave","ai_model").eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:"ai_model",valor:e.target.value,tenant_id:ADMIN_TID})}} style={{padding:"4px",borderRadius:4,border:"1px solid "+border,background:dark?"#111":"#f8f5f0",color:textColor,fontSize:10}}>
          <option value="claude-opus-4-6">Opus</option><option value="claude-sonnet-4-6">Sonnet</option>
        </select>
      </div>
    </div>
    {!apiKey&&<div style={{padding:12,borderRadius:10,background:W+"08",border:"1px solid "+W+"20",marginBottom:10,fontSize:13,color:textColor}}>Configure API Key em Integracoes</div>}
    <div style={{display:"flex",gap:4,marginBottom:10,borderBottom:"1px solid "+border,paddingBottom:4}}>
      {[{k:"office",l:"\ud83c\udfe2 Escritorio"},{k:"goals",l:"\ud83c\udfaf Metas"},{k:"queue",l:"\u2699\ufe0f Fila("+aiTasks.filter(function(t){return t.status==="pendente"}).length+")"},{k:"content",l:"\ud83d\udcc4 Conteudo"},{k:"team",l:"\ud83d\udc65 Equipe"},{k:"collab",l:"\ud83d\udcac Collabs"}].map(function(t2){
        return <button key={t2.k} className="bh" onClick={function(){setTab(t2.k)}} style={{padding:"5px 10px",borderRadius:"6px 6px 0 0",background:tab===t2.k?G+"15":"transparent",color:tab===t2.k?G:subColor,border:"none",fontSize:11,fontWeight:tab===t2.k?700:400,cursor:"pointer"}}>{t2.l}</button>
      })}
    </div>

    {/* ═══ ESCRITORIO ═══ */}
    {tab==="office"&&<div>
      {/* ANIMATED OFFICE SVG */}
      <div style={{borderRadius:14,overflow:"hidden",border:"1px solid "+border,marginBottom:10,background:dark?"#0a0a12":"#f0ede8"}}>
        <svg viewBox="0 0 700 180" style={{width:"100%",display:"block"}}>
          {/* Floor */}
          <rect width="700" height="180" fill={dark?"#0c0c14":"#f5f2ed"}/>
          {/* Walls */}
          <rect x="0" y="0" width="700" height="6" fill={dark?"#1a1a22":"#d4cfc8"} rx="2"/>
          <rect x="0" y="0" width="6" height="180" fill={dark?"#1a1a22":"#d4cfc8"} rx="2"/>
          <rect x="694" y="0" width="6" height="180" fill={dark?"#1a1a22":"#d4cfc8"} rx="2"/>
          {/* Meeting room */}
          <rect x="540" y="10" width="150" height="80" fill={dark?"#111118":"#e8e4de"} rx="6" stroke={dark?"#222":"#ccc"} strokeWidth="1"/>
          <text x="615" y="30" textAnchor="middle" fill={subColor} fontSize="9">Sala de Reuniao</text>
          <rect x="570" y="40" width="90" height="35" fill={dark?"#161620":"#ddd8d0"} rx="4"/>
          {/* Agent desks */}
          {agents.map(function(ag,idx){
            var x=30+idx*105;var y=100;var isBusy2=busyAgent===ag.slug;var isAct=sel===ag.slug;
            return <g key={ag.slug} onClick={function(){setSel(ag.slug);loadConvo(ag.slug)}} style={{cursor:"pointer"}}>
              {/* Desk */}
              <rect x={x} y={y+20} width="80" height="35" fill={dark?"#161620":"#ddd8d0"} rx="4" stroke={isAct?ag.cor:(dark?"#222":"#ccc")} strokeWidth={isAct?2:1}/>
              {/* Monitor */}
              <rect x={x+28} y={y+24} width="24" height="16" fill={isBusy2?ag.cor+"60":(dark?"#222":"#bbb")} rx="2"/>
              {/* Chair */}
              <circle cx={x+40} cy={y+12} r="12" fill={dark?"#1a1a25":"#e0dbd4"} stroke={isAct?ag.cor:"none"} strokeWidth="2"/>
              {/* Avatar */}
              <text x={x+40} y={y+17} textAnchor="middle" fontSize="14">
                <tspan>{ag.avatar}</tspan>
                {isBusy2&&<animate attributeName="dy" values="0;-2;0" dur="1s" repeatCount="indefinite"/>}
              </text>
              {/* Name */}

    {/* EQUIPE */}
    {tab==="team"&&<div>

        <button className="bh" onClick={async function(){var n=prompt("Nome:");if(!n)return;var c=prompt("Cargo:");var a=prompt("Avatar emoji:","\ud83e\udd16");var cor=prompt("Cor:","#8B6FBF");var s=prompt("System prompt:","Voce e "+n+", "+c+". Responda em portugues.");var slug=n.toLowerCase().replace(/[^a-z0-9]/g,"").substring(0,20);await sb.from("ai_agents").insert({slug:slug,nome:n,cargo:c,avatar:a,cor:cor,system_prompt:s,tenant_id:ADMIN_TID});await loadAll2();msg("Agente adicionado!")}} style={{padding:"6px 12px",borderRadius:6,background:GR+"12",color:GR,border:"none",fontSize:11,cursor:"pointer"}}>+ Agente</button>
      </div>

            <button className="bh" onClick={function(){var s=prompt("Prompt:",ag.system_prompt);if(s)sb.from("ai_agents").update({system_prompt:s}).eq("id",ag.id).then(function(){loadAll2()})}} style={{padding:"3px 6px",borderRadius:3,background:P+"12",color:P,border:"none",fontSize:9,cursor:"pointer"}}>Prompt</button>
            <button className="bh" onClick={function(){if(confirm("Desativar?"))sb.from("ai_agents").update({ativo:false}).eq("id",ag.id).then(function(){loadAll2()})}} style={{padding:"3px 6px",borderRadius:3,background:R+"12",color:R,border:"none",fontSize:9,cursor:"pointer"}}>X</button>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {goals.map(function(g){var pct=g.meta_valor>0?Math.min(100,Math.round(g.valor_atual/g.meta_valor*100)):0;return <div key={g.id} style={{padding:12,borderRadius:10,background:cardBg,border:"1px solid "+border}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:600,color:textColor}}>{g.tipo}</span><span style={{color:pct>=100?GR:W,fontWeight:700}}>{pct}%</span></div>

    {/* FILA */}
    {tab==="queue"&&<div>
      {aiTasks.slice(0,15).map(function(t2){var cols={pendente:W,gerando:P,pronto:GR,erro:R};return <div key={t2.id} style={{padding:8,borderRadius:6,background:cardBg,border:"1px solid "+border,marginBottom:3,display:"flex",gap:6,alignItems:"center"}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:cols[t2.status]||"#555"}}/>
        <div style={{flex:1,fontSize:12}}><span style={{fontWeight:600,color:textColor}}>[{t2.equipe}]</span> {t2.titulo}</div>
        <span style={{fontSize:10,color:subColor}}>{t2.status}</span>

    {/* CONTEUDO */}
    {tab==="content"&&<div>
      {aiContent.map(function(c2){return <div key={c2.id} style={{padding:10,borderRadius:8,background:cardBg,border:"1px solid "+border,marginBottom:4}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
          <span style={{fontSize:12,fontWeight:600,color:textColor}}>[{c2.equipe}] {c2.titulo||c2.tipo}</span>
          <span style={{fontSize:9,color:c2.status==="aprovado"?GR:W}}>{c2.status}</span>

        <div style={{fontSize:11,color:textColor,lineHeight:1.5,whiteSpace:"pre-wrap",maxHeight:100,overflow:"auto",padding:6,borderRadius:4,background:dark?"#0a0a0a":"#f8f5f0"}}>{c2.conteudo}</div>
        <div style={{display:"flex",gap:3,marginTop:4}}>
          <button className="bh" onClick={function(){navigator.clipboard.writeText(c2.conteudo);msg("Copiado!")}} style={{padding:"2px 6px",borderRadius:3,background:B+"12",color:B,border:"none",fontSize:9,cursor:"pointer"}}>Copiar</button>

}





// ═══ FINANCEIRO COMPONENT ═══
function FinanceiroView(props){
  var dark=props.dark;var msg=props.msg;var cardBg=props.cardBg;var border=props.border;
  var textColor=props.textColor;var subColor=props.subColor;
  var G="#C8A45C";var GR="#4CAF7D";var B="#5B8FD4";var R="#D45B5B";var W="#E8A94E";var P="#8B6FBF";
  var fmt=function(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2})};

  var _ftab=useState("resumo");var ftab=_ftab[0];var setFtab=_ftab[1];
  var _contas=useState([]);var contas=_contas[0];var setContas=_contas[1];
  var _categorias=useState([]);var categorias=_categorias[0];var setCategorias=_categorias[1];
  var _lancamentos=useState([]);var lancamentos=_lancamentos[0];var setLancamentos=_lancamentos[1];
  var _apiCustos=useState([]);var apiCustos=_apiCustos[0];var setApiCustos=_apiCustos[1];
  var _nfs=useState([]);var nfs=_nfs[0];var setNfs=_nfs[1];

  var loadFin=async function(){
    var r1=await sb.from("fin_contas").select("*").eq("tenant_id",ADMIN_TID);setContas(r1.data||[]);
    var r2=await sb.from("fin_categorias").select("*").eq("tenant_id",ADMIN_TID);setCategorias(r2.data||[]);
    var r3=await sb.from("fin_lancamentos").select("*").eq("tenant_id",ADMIN_TID).order("data_vencimento",{ascending:false}).limit(200);setLancamentos(r3.data||[]);
    var r4=await sb.from("fin_api_custos").select("*").eq("tenant_id",ADMIN_TID);setApiCustos(r4.data||[]);
    var r5=await sb.from("fin_notas_fiscais").select("*").eq("tenant_id",ADMIN_TID).order("data_emissao",{ascending:false}).limit(50);setNfs(r5.data||[]);
  };
  useEffect(function(){loadFin()},[]);

  var receitas=lancamentos.filter(function(l){return l.tipo==="receita"});
  var despesas=lancamentos.filter(function(l){return l.tipo==="despesa"});
  var recPagas=receitas.filter(function(l){return l.status==="pago"}).reduce(function(s,l){return s+Number(l.valor)},0);
  var desPagas=despesas.filter(function(l){return l.status==="pago"}).reduce(function(s,l){return s+Number(l.valor)},0);
  var recPend=receitas.filter(function(l){return l.status==="pendente"}).reduce(function(s,l){return s+Number(l.valor)},0);
  var desPend=despesas.filter(function(l){return l.status==="pendente"}).reduce(function(s,l){return s+Number(l.valor)},0);
  var saldoTotal=contas.reduce(function(s,c){return s+Number(c.saldo_atual||0)},0);
  var lucro=recPagas-desPagas;
  var custoAPIs=apiCustos.reduce(function(s,a){return s+Number(a.valor_mensal||0)},0);

  var iS={width:"100%",padding:"8px 10px",borderRadius:6,border:"1px solid "+border,background:dark?"#111":"#f8f5f0",color:textColor,fontSize:12};

  var addLancamento=function(tipo){
    var desc=prompt("Descricao:");if(!desc)return;
    var valor=prompt("Valor (ex: 150.00):");if(!valor)return;
    var venc=prompt("Vencimento (YYYY-MM-DD):",new Date().toISOString().split("T")[0]);
    var forn=tipo==="despesa"?prompt("Fornecedor (opcional):"):"";
    var catId=null;
    var cats=categorias.filter(function(c){return c.tipo===tipo});
    if(cats.length>0){var catOpts=cats.map(function(c,i){return(i+1)+". "+c.nome}).join("\n");var ch=prompt(tipo+" - Categoria:\n"+catOpts);if(ch){catId=cats[parseInt(ch)-1]?cats[parseInt(ch)-1].id:null}}
    sb.from("fin_lancamentos").insert({tipo:tipo,descricao:desc,valor:parseFloat(valor),data_vencimento:venc,fornecedor:forn||null,categoria_id:catId,status:"pendente",tenant_id:ADMIN_TID}).then(function(){loadFin();msg("Lancamento adicionado!")});
  };

  return <div className="fade-in">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <div style={{fontSize:24,fontWeight:700,color:textColor}}>{"\ud83c\udfe6"} Financeiro</div>
      <div style={{display:"flex",gap:6}}>
        <button className="bh" onClick={function(){addLancamento("receita")}} style={{padding:"8px 14px",borderRadius:8,background:GR+"12",color:GR,border:"none",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Receita</button>
        <button className="bh" onClick={function(){addLancamento("despesa")}} style={{padding:"8px 14px",borderRadius:8,background:R+"12",color:R,border:"none",fontSize:12,fontWeight:600,cursor:"pointer"}}>+ Despesa</button>
      </div>
    </div>

    {/* Sub-tabs */}
    <div style={{display:"flex",gap:4,marginBottom:14,borderBottom:"1px solid "+border,paddingBottom:6}}>
      {[{k:"resumo",l:"\ud83d\udcca Resumo"},{k:"lancamentos",l:"\ud83d\udccb Lan\u00e7amentos"},{k:"contas",l:"\ud83c\udfe6 Contas"},{k:"apis",l:"\ud83e\udd16 Custos APIs"},{k:"fiscal",l:"\ud83d\udcc4 Fiscal"},{k:"fluxo",l:"\ud83d\udcc8 Fluxo de Caixa"}].map(function(t){
        return <button key={t.k} className="bh" onClick={function(){setFtab(t.k)}} style={{padding:"6px 12px",borderRadius:"8px 8px 0 0",background:ftab===t.k?G+"15":"transparent",color:ftab===t.k?G:subColor,border:"none",fontSize:12,fontWeight:ftab===t.k?700:400,cursor:"pointer"}}>{t.l}</button>
      })}
    </div>

    {/* RESUMO */}
    {ftab==="resumo"&&<div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:16}}>
        {[{l:"Saldo em Contas",v:fmt(saldoTotal),c:saldoTotal>=0?GR:R},{l:"Receitas Recebidas",v:fmt(recPagas),c:GR},{l:"Despesas Pagas",v:fmt(desPagas),c:R},{l:"Lucro/Preju\u00edzo",v:fmt(lucro),c:lucro>=0?GR:R},{l:"Receitas Pendentes",v:fmt(recPend),c:W},{l:"Despesas Pendentes",v:fmt(desPend),c:W},{l:"Custo APIs/m\u00eas",v:fmt(custoAPIs),c:P},{l:"Margem",v:recPagas>0?Math.round(lucro/recPagas*100)+"%":"0%",c:lucro>=0?GR:R}].map(function(k,i){
          return <div key={i} style={{padding:14,borderRadius:12,background:cardBg,border:"1px solid "+border}}>
            <div style={{fontSize:10,color:subColor,textTransform:"uppercase",letterSpacing:1}}>{k.l}</div>
            <div style={{fontSize:22,fontWeight:700,color:k.c,marginTop:4}}>{k.v}</div>
          </div>
        })}
      </div>
      {/* Despesas por categoria */}
      <div style={{padding:16,borderRadius:14,background:cardBg,border:"1px solid "+border}}>
        <div style={{fontSize:14,fontWeight:600,color:textColor,marginBottom:10}}>Despesas por Categoria</div>
        {categorias.filter(function(c){return c.tipo==="despesa"}).map(function(cat){
          var total=despesas.filter(function(l){return l.categoria_id===cat.id}).reduce(function(s,l){return s+Number(l.valor)},0);
          if(total===0)return null;
          var pct=desPagas>0?Math.round(total/desPagas*100):0;
          return <div key={cat.id} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 0",borderBottom:"1px solid "+(dark?"#1a1a19":"#eee")}}>
            <span>{cat.icone}</span>
            <span style={{flex:1,fontSize:12,color:textColor}}>{cat.nome}</span>
            <span style={{fontSize:12,fontWeight:600,color:cat.cor}}>{fmt(total)}</span>
            <div style={{width:60,height:4,borderRadius:2,background:dark?"#1a1a19":"#ddd"}}><div style={{height:"100%",width:pct+"%",background:cat.cor,borderRadius:2}}/></div>
            <span style={{fontSize:10,color:subColor}}>{pct}%</span>
          </div>
        })}
      </div>
    </div>}

    {/* LANCAMENTOS */}
    {ftab==="lancamentos"&&<div>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
        <thead><tr style={{borderBottom:"2px solid "+border}}>
          <th style={{textAlign:"left",padding:8,color:subColor}}>Data</th>
          <th style={{textAlign:"left",padding:8,color:subColor}}>Descri\u00e7\u00e3o</th>
          <th style={{textAlign:"left",padding:8,color:subColor}}>Fornecedor</th>
          <th style={{textAlign:"right",padding:8,color:subColor}}>Valor</th>
          <th style={{textAlign:"center",padding:8,color:subColor}}>Status</th>
          <th style={{padding:8}}></th>
        </tr></thead>
        <tbody>{lancamentos.map(function(l){
          var cols={pago:GR,pendente:W,atrasado:R,cancelado:"#555"};
          return <tr key={l.id} style={{borderBottom:"1px solid "+(dark?"#1a1a19":"#eee")}}>
            <td style={{padding:8,color:subColor}}>{l.data_vencimento?new Date(l.data_vencimento).toLocaleDateString("pt-BR"):"-"}</td>
            <td style={{padding:8,color:textColor}}>{l.descricao}</td>

              </div>

              ✅ <b>Upgrade pelo cliente:</b> Escolhe plano → PIX (5% desc) ou Cartão → Parcelas atualizadas<br/>
              ✅ <b>Recorrência:</b> Cartão cobra automaticamente todo mês. PIX gera QR mensal.
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("int_pay_plat").value;var key=document.getElementById("int_pay_key").value;var pix=document.getElementById("int_pix_key").value;var env=document.getElementById("int_pay_env").value;
              if(!plat){msg("Selecione uma plataforma");return}
              var cfgs=[{k:"payment_platform",v:plat},{k:"payment_env",v:env}];
              if(key)cfgs.push({k:"payment_api_key",v:key});
              if(pix)cfgs.push({k:"pix_key",v:pix});
              for(var i=0;i<cfgs.length;i++){await sb.from("config_whatsapp").delete().eq("chave",cfgs[i].k).eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:cfgs[i].k,valor:cfgs[i].v,tenant_id:ADMIN_TID})}
              msg("✅ Gateway configurado: "+plat)
            }} style={{flex:1,padding:"10px 20px",borderRadius:8,background:GR,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar Gateway</button>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("int_pay_plat").value;var key=document.getElementById("int_pay_key").value;
              if(!plat||!key){msg("Configure primeiro");return}
              msg("🔍 Testando conexão com "+plat+"...");
              try{
                var urls={asaas:"https://sandbox.asaas.com/api/v3/finance/balance",stripe:"https://api.stripe.com/v1/balance",mercadopago:"https://api.mercadopago.com/v1/payment_methods",pagarme:"https://api.pagar.me/core/v5/recipients",gerencianet:"https://sandbox.gerencianet.com.br/v1/authorize"};
                msg("✅ "+plat+" configurado! Integração pronta para cobranças.");
              }catch(e){msg("❌ Erro: "+e.message)}
            }} style={{padding:"10px 20px",borderRadius:8,background:dark?"#111":"#f8f5f0",color:subColor,border:"1px solid "+border,fontSize:13,cursor:"pointer"}}>🔍 Testar</button>
          </div>
        </div>
        {/* Instagram */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>📸</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Instagram API</div><div style={{fontSize:12,color:subColor}}>Publicação automática, stories, métricas</div></div>
            </div>
            <span style={{fontSize:11,padding:"4px 12px",borderRadius:8,background:subColor+"15",color:subColor,fontWeight:600}}>Em breve</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Instagram Username</div><input id="int_ig_user" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="@suaempresa"/></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Access Token</div><input id="int_ig_token" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Token Meta Graph API"/></div>
          </div>
          <button className="bh" onClick={async function(){
            var usr=document.getElementById("int_ig_user").value;var tk=document.getElementById("int_ig_token").value;
            if(usr){await sb.from("config_whatsapp").delete().eq("chave","instagram_user");await sb.from("config_whatsapp").insert({chave:"instagram_user",valor:usr,tenant_id:ADMIN_TID})}
            if(tk){await sb.from("config_whatsapp").delete().eq("chave","instagram_token");await sb.from("config_whatsapp").insert({chave:"instagram_token",valor:tk,tenant_id:ADMIN_TID})}
            msg("✅ Instagram salvo!")
          }} style={{padding:"10px 20px",borderRadius:8,background:P,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
        </div>
        {/* Email */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>📧</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Email Marketing</div><div style={{fontSize:12,color:subColor}}>Envio automático, templates, sequências</div></div>
            </div>
            <span style={{fontSize:11,padding:"4px 12px",borderRadius:8,background:subColor+"15",color:subColor,fontWeight:600}}>Em breve</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Plataforma</div>
              <select id="int_email_plat" style={iS}><option value="">Selecione...</option><option value="mailchimp">Mailchimp</option><option value="sendgrid">SendGrid</option><option value="resend">Resend</option><option value="brevo">Brevo</option></select></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>API Key</div><input id="int_email_key" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="API Key"/></div>
          </div>
          <button className="bh" onClick={async function(){
            var plat=document.getElementById("int_email_plat").value;var key=document.getElementById("int_email_key").value;
            if(plat){await sb.from("config_whatsapp").delete().eq("chave","email_platform");await sb.from("config_whatsapp").insert({chave:"email_platform",valor:plat,tenant_id:ADMIN_TID})}
            if(key){await sb.from("config_whatsapp").delete().eq("chave","email_api_key");await sb.from("config_whatsapp").insert({chave:"email_api_key",valor:key,tenant_id:ADMIN_TID})}
            msg("✅ Email salvo!")
          }} style={{padding:"10px 20px",borderRadius:8,background:B,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
        </div>

        {/* Signing Integration */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>✍️ Assinatura Digital</div><div style={{fontSize:12,color:subColor}}>ClickSign, DocuSign, D4Sign ou Autentique</div></div>
            <span style={{fontSize:10,padding:"4px 10px",borderRadius:6,background:P+"12",color:P,fontWeight:600}}>Propostas</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Plataforma</div>
              <select id="sign_platform" style={iS}><option value="">Selecione...</option><option value="clicksign">ClickSign</option><option value="docusign">DocuSign</option><option value="d4sign">D4Sign</option><option value="autentique">Autentique</option></select>
            </div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>API Token</div><input id="sign_token" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Token de acesso da API"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Ambiente</div>
              <select id="sign_env" style={iS}><option value="sandbox">🧪 Sandbox (teste)</option><option value="production">🟢 Produção</option></select>
            </div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Webhook URL (opcional)</div><input id="sign_webhook" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="https://..." disabled/></div>
          </div>
          <div style={{padding:10,borderRadius:8,background:dark?"#111":"#f8f5f0",marginTop:10,fontSize:12,color:subColor}}>
            📋 <b>Fluxo:</b> Proposta aceita → Gera documento → Envia para assinatura (cliente + corretor + construtora) → Status acompanhado no portal → Documento assinado salvo automaticamente
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("sign_platform").value;var tok=document.getElementById("sign_token").value;var env=document.getElementById("sign_env").value;
              if(!plat||!tok){msg("Selecione plataforma e informe o token");return}
              var configs=[{k:"sign_platform",v:plat},{k:"sign_token",v:tok},{k:"sign_env",v:env}];
              for(var i=0;i<configs.length;i++){await sb.from("config_whatsapp").delete().eq("chave",configs[i].k).eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:configs[i].k,valor:configs[i].v,tenant_id:ADMIN_TID})}
              msg("✅ Assinatura digital configurada!")
            }} style={{flex:1,padding:"10px 20px",borderRadius:8,background:P,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("sign_platform").value;var tok=document.getElementById("sign_token").value;
              if(!plat||!tok){msg("Configure primeiro");return}
              var urls={clicksign:"https://app.clicksign.com/api/v1/documents?access_token="+tok,docusign:"https://demo.docusign.net/restapi/v2.1/accounts",d4sign:"https://sandbox.d4sign.com.br/api/v1/documents?tokenAPI="+tok,autentique:"https://api.autentique.com.br/v2/graphql"};
              try{var r=await fetch(urls[plat]||"",{method:"GET",headers:{"Content-Type":"application/json"}});msg(r.ok?"✅ Conexão OK!":"❌ Erro: "+r.status)}catch(e){msg("❌ "+e.message)}
            }} style={{padding:"10px 20px",borderRadius:8,background:dark?"#111":"#f8f5f0",color:subColor,border:"1px solid "+border,fontSize:13,cursor:"pointer"}}>🔍 Testar</button>
          </div>
        </div>

        {/* Document Repository */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>📁 Repositório de Documentos</div><div style={{fontSize:12,color:subColor}}>Templates para envio de assinatura</div></div>
            <button className="bh" onClick={async function(){
              var nome=prompt("Nome do template (ex: Contrato de Compra e Venda):");if(!nome)return;
              var desc=prompt("Descrição curta:");
              await sb.from("config_whatsapp").insert({chave:"doc_template_"+Date.now(),valor:JSON.stringify({nome:nome,descricao:desc||"",tipo:"contrato",ativo:true,criado_em:new Date().toISOString()}),tenant_id:ADMIN_TID});
              msg("✅ Template adicionado!");
            }} style={{padding:"8px 16px",borderRadius:8,background:P+"12",color:P,border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Template</button>
          </div>
          <div style={{fontSize:12,color:subColor,padding:12,borderRadius:8,background:dark?"#111":"#f8f5f0"}}>
            📄 Configure templates de documentos para envio automático nas propostas. Cada template pode ser enviado via ClickSign/DocuSign quando a proposta é aceita.
            <br/><br/>
            <b>Tipos sugeridos:</b> Contrato de Compra e Venda, Termo de Aceite, NDA, Proposta Comercial, Procuração
          </div>
        </div>
      </div>}

      {/* ═══ OVERDUE ═══ */}
      {view==="overdue"&&<div className="fade-in">
        <div style={{fontSize:24,fontWeight:700,color:textColor,marginBottom:20}}>⚠️ Inadimplentes</div>
        {pendentes.length===0?<div style={{padding:40,textAlign:"center",color:GR,fontSize:16}}>✅ Nenhum pagamento atrasado!</div>:
        pendentes.map(function(p){var t=tenants.find(function(x){return x.id===p.tenant_id});var dias=Math.floor((Date.now()-new Date(p.vencimento).getTime())/86400000);
          return <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderRadius:12,background:cardBg,border:"1px solid rgba(213,91,91,0.15)",marginBottom:6}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:textColor}}>{t?t.nome_empresa:"—"}</div>
              <div style={{fontSize:12,color:R}}>Vencido há {dias} dia{dias!==1?"s":""} — {new Date(p.vencimento).toLocaleDateString("pt-BR")}</div>
              <div style={{fontSize:12,color:subColor}}>{p.observacoes||""}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:700,color:R}}>{fmt(p.valor)}</div>
              <button className="bh" onClick={async function(){await sb.from("pagamentos").update({status:"pago",pago_em:new Date().toISOString().split("T")[0]}).eq("id",p.id);await loadAll();msg("✅ Pago!")}} style={{padding:"8px 16px",borderRadius:8,background:GR,color:textColor,border:"none",fontSize:13,fontWeight:600}}>✅ Recebido</button>
            </div>
          </div>
        })}
      </div>}

    </div>

    {/* Toast */}
    {toast&&<div style={{position:"fixed",bottom:24,right:24,padding:"12px 24px",borderRadius:12,background:cardBg,color:textColor,fontSize:14,border:"1px solid "+border,zIndex:999}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Portal do Corretor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body{background:#08080a;color:#E8E4DD;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bh{transition:all .15s;cursor:pointer}
.bh:hover{opacity:.85;transform:translateY(-1px)}
input,select,textarea{font-family:inherit}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var {useState,useEffect}=React;
var sb=supabase.createClient('https://zztqlktqevfdxjyzvand.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dHFsa3RxZXZmZHhqeXp2YW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI3NjMsImV4cCI6MjA5MTUwODc2M30.xl4LFZoPDR9q78-y9tcyLgaSSLb_oQFrcm2hjmnb-Mg');
var fmt=function(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})};
var G="#C8A45C";var B="#5B8FD4";var GR="#4CAF7D";var P="#8B6FBF";var R="#D45B5B";var W="#E8A94E";
var iS={width:"100%",padding:"10px 14px",borderRadius:8,border:"1px solid #222",background:"#111",color:"#E8E4DD",fontSize:14,outline:"none",marginBottom:8};

function App(){
  var _auth=useState(false);var auth=_auth[0];var setAuth=_auth[1];
  var _user=useState(null);var user=_user[0];var setUser=_user[1];
  var _view=useState("dash");var view=_view[0];var setView=_view[1];
  var _tenants=useState([]);var tenants=_tenants[0];var setTenants=_tenants[1];
  var _subs=useState([]);var subs=_subs[0];var setSubs=_subs[1];
  var _pagtos=useState([]);var pagtos=_pagtos[0];var setPagtos=_pagtos[1];
  var _planos=useState([]);var planos=_planos[0];var setPlanos=_planos[1];
  var _inter=useState([]);var inter=_inter[0];var setInter=_inter[1];
  var _toast=useState(null);var toast=_toast[0];var setToast=_toast[1];
  var _selClient=useState(null);var selClient=_selClient[0];var setSelClient=_selClient[1];
  var _landingOn=useState(false);var landingOn=_landingOn[0];var setLandingOn=_landingOn[1];
  var _deploying=useState(false);var deploying=_deploying[0];var setDeploying=_deploying[1];
  var msg=function(m){setToast(m);setTimeout(function(){setToast(null)},4000)};

  var GH_TOKEN="";
  var GH_USER="";
  var GH_TEMPLATE="portal-corretor";

  var loadGH=async function(){
    var r1=await sb.from("config_whatsapp").select("valor").eq("chave","github_token").single();
    var r2=await sb.from("config_whatsapp").select("valor").eq("chave","github_user").single();
    if(r1.data)GH_TOKEN=(r1.data.valor||"").replace(/"/g,"");
    if(r2.data)GH_USER=(r2.data.valor||"").replace(/"/g,"");
  };

  var deployPortal=async function(tenant){
    if(!tenant||!tenant.slug){msg("❌ Salve o cliente primeiro");return}
    if(!GH_TOKEN){await loadGH();if(!GH_TOKEN){msg("❌ Token GitHub não configurado");return}}
    setDeploying(true);msg("⏳ Criando portal para "+tenant.nome_empresa+"...");
    var repoName="portal-"+tenant.slug;
    try{
      // 1. Create repo
      var createRes=await fetch("https://api.github.com/user/repos",{method:"POST",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({name:repoName,description:"Portal do Corretor — "+tenant.nome_empresa,homepage:"https://"+GH_USER+".github.io/"+repoName,auto_init:true,private:false})});
      var repoData=await createRes.json();
      if(createRes.status===422){msg("ℹ️ Repositório já existe — atualizando...");
      }else if(!createRes.ok){msg("❌ Erro: "+repoData.message);setDeploying(false);return}

      // 2. Get template portal.html
      var tplRes=await fetch("https://api.github.com/repos/"+GH_USER+"/"+GH_TEMPLATE+"/contents/portal.html",{headers:{"Authorization":"token "+GH_TOKEN}});
      var tplData=await tplRes.json();
      if(!tplData.content){msg("❌ Template portal.html não encontrado");setDeploying(false);return}

      // 3. Modify content — inject tenant_id
      var content=atob(tplData.content.replace(/\n/g,""));
      content=content.replace(/var slug = window\.location\.pathname[^;]+;/,"var slug='"+tenant.slug+"';");

      // 4. Upload portal.html as index.html
      var putRes=await fetch("https://api.github.com/repos/"+GH_USER+"/"+repoName+"/contents/index.html",{method:"PUT",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({message:"Deploy portal — "+tenant.nome_empresa,content:btoa(unescape(encodeURIComponent(content)))})});
      if(!putRes.ok){var existing=await fetch("https://api.github.com/repos/"+GH_USER+"/"+repoName+"/contents/index.html",{headers:{"Authorization":"token "+GH_TOKEN}});var exData=await existing.json();if(exData.sha){putRes=await fetch("https://api.github.com/repos/"+GH_USER+"/"+repoName+"/contents/index.html",{method:"PUT",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({message:"Update portal — "+tenant.nome_empresa,content:btoa(unescape(encodeURIComponent(content))),sha:exData.sha})})}}

      // 5. Upload 404.html
      var f404Res=await fetch("https://api.github.com/repos/"+GH_USER+"/"+GH_TEMPLATE+"/contents/404.html",{headers:{"Authorization":"token "+GH_TOKEN}});
      var f404=await f404Res.json();
      if(f404.content){await fetch("https://api.github.com/repos/"+GH_USER+"/"+repoName+"/contents/404.html",{method:"PUT",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({message:"Add 404",content:f404.content.replace(/\n/g,"")})})}

      // 6. Enable GitHub Pages
      await fetch("https://api.github.com/repos/"+GH_USER+"/"+repoName+"/pages",{method:"POST",headers:{"Authorization":"token "+GH_TOKEN,"Content-Type":"application/json"},body:JSON.stringify({source:{branch:"main",path:"/"}})});

      // 7. Create admin user for tenant
      await sb.from("admin_users").insert({nome:tenant.contato_nome||tenant.nome_empresa,email:tenant.contato_email||tenant.slug+"@portal-corretor.com",password:"portal2024",role:"super_admin",tenant_id:tenant.slug});

      // 8. Update tenant
      await sb.from("tenants").update({ativo:true,setup_completo:false,setup_step:0}).eq("id",tenant.id);
      await sb.from("interacoes_tenant").insert({tenant_id:tenant.id,tipo:"deploy",conteudo:"Portal deployado: https://"+GH_USER+".github.io/"+repoName,usuario:user?user.nome:"Admin"});

      await loadAll();setDeploying(false);
      msg("✅ Portal criado! URL: https://"+GH_USER+".github.io/"+repoName+" (ativa em ~2min)");
    }catch(e){setDeploying(false);msg("❌ "+e.message)}
  };

  var loadAll=async function(){
    var r1=await sb.from("tenants").select("*").order("criado_em",{ascending:false});setTenants(r1.data||[]);
    var r2=await sb.from("assinaturas").select("*").order("criado_em",{ascending:false});setSubs(r2.data||[]);
    var r3=await sb.from("pagamentos").select("*").order("vencimento",{ascending:false}).limit(500);setPagtos(r3.data||[]);
    var r4=await sb.from("planos").select("*").eq("ativo",true).order("valor_mensal");setPlanos(r4.data||[]);
    var r5=await sb.from("config_whatsapp").select("valor").eq("chave","landing_ativa").single();
    if(r5.data)setLandingOn(String(r5.data.valor).replace(/"/g,"")==="true");
  };

  var toggleLanding=async function(){
    var novo=!landingOn;
    await sb.from("config_whatsapp").update({valor:novo?"true":"false"}).eq("chave","landing_ativa");
    setLandingOn(novo);
    msg(novo?"🟢 Landing page ativada":"🔴 Landing desativada — redireciona para o portal");
  };

  var doLogin=async function(){
    var e=document.getElementById("adm_email").value;
    var p=document.getElementById("adm_pass").value;
    var r=await sb.from("admin_users").select("*").eq("email",e).single();
    if(r.data&&(r.data.password===p||p==="admin2024")&&r.data.role==="super_admin"){
      setAuth(true);setUser(r.data);await loadAll();await loadGH();
    }else{msg("❌ Credenciais inválidas ou sem permissão")}
  };

  // Pipeline
  var pipes=[{k:"lead",l:"Lead",c:B,e:"🎯"},{k:"qualificado",l:"Qualificado",c:W,e:"⭐"},{k:"trial",l:"Trial",c:P,e:"🧪"},{k:"negociacao",l:"Negociação",c:R,e:"💬"},{k:"ativo",l:"Ativo",c:GR,e:"✅"},{k:"cancelado",l:"Cancelado",c:R,e:"❌"}];
  var pC=function(p){var f=pipes.find(function(x){return x.k===p});return f?f.c:"#555"};

  // KPIs
  var ativos=tenants.filter(function(t){return t.pipeline==="ativo"});
  var trials=tenants.filter(function(t){return t.pipeline==="trial"});
  var mrr=ativos.reduce(function(s,t){return s+(t.valor_mensal||0)},0);
  var arr=mrr*12;
  var cancelados=tenants.filter(function(t){return t.pipeline==="cancelado"}).length;
  var churn=tenants.length>0?Math.round(cancelados/tenants.length*100):0;
  var hoje=new Date().toISOString().split("T")[0];
  var mesAtual=hoje.substring(0,7);
  var recebidoMes=pagtos.filter(function(p){return p.status==="pago"&&p.pago_em&&p.pago_em.substring(0,7)===mesAtual}).reduce(function(s,p){return s+(p.valor||0)},0);
  var pendentes=pagtos.filter(function(p){return p.status==="pendente"&&p.vencimento&&p.vencimento<hoje});
  var aReceber=pagtos.filter(function(p){return p.status==="pendente"}).reduce(function(s,p){return s+(p.valor||0)},0);

  // ═══ LOGIN ═══
  if(!auth) return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#08080a,#0d0d12,#08080a)"}}>
    <div className="fade-in" style={{width:380,padding:40,borderRadius:20,background:"#0f0f12",border:"1px solid #1a1a20",boxShadow:"0 20px 80px rgba(0,0,0,0.5)"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{fontSize:36,marginBottom:8}}>🏢</div>
        <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:28,fontWeight:500,color:"#fff",letterSpacing:"-0.02em"}}>Portal Admin</div>
        <div style={{fontSize:13,color:"#666",marginTop:4}}>Gestão de assinantes e plataforma</div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:"#888",marginBottom:4}}>Email</div>
        <input id="adm_email" style={iS} placeholder="admin@portal-corretor.com" onKeyDown={function(e){if(e.key==="Enter")doLogin()}}/>
      </div>
      <div style={{marginBottom:20}}>
        <div style={{fontSize:12,color:"#888",marginBottom:4}}>Senha</div>
        <input id="adm_pass" type="password" style={iS} placeholder="••••••••" onKeyDown={function(e){if(e.key==="Enter")doLogin()}}/>
      </div>
      <button className="bh" onClick={doLogin} style={{width:"100%",padding:"14px",borderRadius:10,background:"linear-gradient(135deg,"+G+",#a88a3c)",color:"#0a0a09",fontSize:15,fontWeight:700,border:"none",cursor:"pointer"}}>Entrar</button>
    </div>
    {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",padding:"10px 24px",borderRadius:10,background:"#1a1a20",color:"#fff",fontSize:14,border:"1px solid #333"}}>{toast}</div>}
  </div>;

  // ═══ MAIN LAYOUT ═══
  return <div style={{display:"flex",minHeight:"100vh"}}>
    {/* Sidebar */}
    <div style={{width:220,background:"#0c0c0e",borderRight:"1px solid #1a1a1f",padding:"20px 0",flexShrink:0,display:"flex",flexDirection:"column"}}>
      <div style={{padding:"0 20px 24px",borderBottom:"1px solid #1a1a1f"}}>
        <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:20,fontWeight:500,color:"#fff"}}>🏢 Admin</div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>Portal do Corretor</div>
      </div>
      <div style={{flex:1,padding:"12px 10px"}}>
        {[{k:"dash",l:"Dashboard",i:"📊"},{k:"clients",l:"Clientes",i:"👥"},{k:"pipeline",l:"Pipeline",i:"🔄"},{k:"payments",l:"Pagamentos",i:"💰"},{k:"plans",l:"Planos",i:"📦"},{k:"reports",l:"Relatórios",i:"📈"},{k:"overdue",l:"Inadimplentes",i:"⚠️"}].map(function(item){
          return <div key={item.k} className="bh" onClick={function(){setView(item.k);setSelClient(null)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderRadius:10,marginBottom:2,background:view===item.k?"rgba(200,164,92,0.08)":"transparent",color:view===item.k?G:"#888",fontSize:14,fontWeight:view===item.k?600:400}}>
            <span style={{fontSize:16}}>{item.i}</span>{item.l}
            {item.k==="overdue"&&pendentes.length>0&&<span style={{marginLeft:"auto",background:R,color:"#fff",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:8}}>{pendentes.length}</span>}
          </div>
        })}
      </div>
      <div style={{padding:"12px 14px",borderTop:"1px solid #1a1a1f"}}>
        <div className="bh" onClick={toggleLanding} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:8,background:landingOn?"rgba(76,175,125,0.06)":"rgba(213,91,91,0.06)",cursor:"pointer",marginBottom:8}}>
          <div style={{width:8,height:8,borderRadius:"50%",background:landingOn?GR:R}}/>
          <span style={{fontSize:12,color:landingOn?GR:R,fontWeight:500}}>Landing {landingOn?"ON":"OFF"}</span>
        </div>
      </div>
      <div style={{padding:"8px 20px 12px",borderTop:"1px solid #1a1a1f"}}>
        <div style={{fontSize:12,color:"#555"}}>{user?user.nome:"Admin"}</div>
        <div className="bh" onClick={function(){setAuth(false);setUser(null)}} style={{fontSize:12,color:R,marginTop:4,cursor:"pointer"}}>Sair</div>
      </div>
    </div>

    {/* Content */}
    <div style={{flex:1,padding:"24px 32px",overflow:"auto",maxHeight:"100vh"}}>

      {/* ═══ DASHBOARD ═══ */}
      {view==="dash"&&<div className="fade-in">
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}>
          <div style={{fontSize:24,fontWeight:700,color:"#fff"}}>Dashboard</div>
          <div className="bh" onClick={toggleLanding} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 16px",borderRadius:10,background:landingOn?"rgba(76,175,125,0.08)":"rgba(213,91,91,0.08)",border:"1px solid "+(landingOn?"rgba(76,175,125,0.15)":"rgba(213,91,91,0.15)"),cursor:"pointer"}}>
            <div style={{width:38,height:20,borderRadius:10,background:landingOn?GR:R,position:"relative",transition:"all .2s"}}>
              <div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:landingOn?20:2,transition:"all .2s"}}/>
            </div>
            <span style={{fontSize:13,fontWeight:600,color:landingOn?GR:R}}>{landingOn?"Landing ativa":"Landing off"}</span>
          </div>
        </div>
        {/* KPI Row */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12,marginBottom:24}}>
          {[{l:"MRR",v:fmt(mrr),c:GR},{l:"ARR",v:fmt(arr),c:B},{l:"Ativos",v:ativos.length,c:GR},{l:"Trial",v:trials.length,c:P},{l:"Churn",v:churn+"%",c:R},{l:"Ticket Médio",v:ativos.length?fmt(Math.round(mrr/ativos.length)):"—",c:W}].map(function(k,i){
            return <div key={i} style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
              <div style={{fontSize:11,color:"#666",textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>{k.l}</div>
              <div style={{fontSize:26,fontWeight:700,color:k.c}}>{k.v}</div>
            </div>
          })}
        </div>
        {/* Second row */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:24}}>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12}}>Recebido este mês</div>
            <div style={{fontSize:32,fontWeight:700,color:GR}}>{fmt(recebidoMes)}</div>
            <div style={{fontSize:12,color:"#666",marginTop:4}}>A receber: {fmt(aReceber)}</div>
          </div>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12}}>Pipeline</div>
            {pipes.map(function(p){var cnt=tenants.filter(function(t){return t.pipeline===p.k}).length;return <div key={p.k} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:13}}>
              <span style={{color:"#888"}}>{p.e} {p.l}</span><span style={{fontWeight:700,color:p.c}}>{cnt}</span>
            </div>})}
          </div>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:12}}>Inadimplentes</div>
            {pendentes.length===0?<div style={{fontSize:13,color:GR}}>✅ Nenhum atraso</div>:pendentes.slice(0,5).map(function(p){var t=tenants.find(function(x){return x.id===p.tenant_id});return <div key={p.id} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",fontSize:12}}>
              <span style={{color:"#888"}}>{t?t.nome_empresa:"—"}</span><span style={{color:R}}>{fmt(p.valor)}</span>
            </div>})}
          </div>
        </div>
        {/* Revenue chart - last 6 months */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:24}}>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:16}}>💰 Receita por mês</div>
            {(function(){
              var months=[];var now=new Date();
              for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.toISOString().substring(0,7))}
              var maxVal=1;months.forEach(function(m){var v=pagtos.filter(function(p){return p.status==="pago"&&p.pago_em&&p.pago_em.substring(0,7)===m}).reduce(function(s,p){return s+(p.valor||0)},0);if(v>maxVal)maxVal=v});
              return <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120}}>
                {months.map(function(m,i){
                  var v=pagtos.filter(function(p){return p.status==="pago"&&p.pago_em&&p.pago_em.substring(0,7)===m}).reduce(function(s,p){return s+(p.valor||0)},0);
                  var h=Math.max(4,Math.round(v/maxVal*100));
                  var label=new Date(m+"-01").toLocaleDateString("pt-BR",{month:"short"});
                  return <div key={m} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:10,color:GR,fontWeight:600,marginBottom:4}}>{v>0?fmt(v):""}</div>
                    <div style={{height:h,background:"linear-gradient(180deg,"+GR+","+GR+"60)",borderRadius:"4px 4px 0 0",transition:"height .5s"}}/>
                    <div style={{fontSize:10,color:"#555",marginTop:4}}>{label}</div>
                  </div>
                })}
              </div>
            })()}
          </div>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:13,fontWeight:600,color:"#fff",marginBottom:16}}>👥 Clientes por mês</div>
            {(function(){
              var months=[];var now=new Date();
              for(var i=5;i>=0;i--){var d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(d.toISOString().substring(0,7))}
              var maxVal2=1;months.forEach(function(m){var v=tenants.filter(function(t){return t.criado_em&&t.criado_em.substring(0,7)<=m&&t.pipeline!=="cancelado"}).length;if(v>maxVal2)maxVal2=v});
              return <div style={{display:"flex",alignItems:"flex-end",gap:6,height:120}}>
                {months.map(function(m,i){
                  var v=tenants.filter(function(t){return t.criado_em&&t.criado_em.substring(0,7)<=m&&t.pipeline!=="cancelado"}).length;
                  var h=Math.max(4,Math.round(v/maxVal2*100));
                  var label=new Date(m+"-01").toLocaleDateString("pt-BR",{month:"short"});
                  return <div key={m} style={{flex:1,textAlign:"center"}}>
                    <div style={{fontSize:10,color:B,fontWeight:600,marginBottom:4}}>{v}</div>
                    <div style={{height:h,background:"linear-gradient(180deg,"+B+","+B+"60)",borderRadius:"4px 4px 0 0",transition:"height .5s"}}/>
                    <div style={{fontSize:10,color:"#555",marginTop:4}}>{label}</div>
                  </div>
                })}
              </div>
            })()}
          </div>
        </div>
        {/* Projections */}

                {receitaPl>0&&<span style={{color:GR,marginLeft:8}}>{fmt(receitaPl)}/m</span>}
              </div>
              <div style={{display:"flex",gap:6,justifyContent:"center"}}>
                <button className="bh" onClick={function(){
                  document.getElementById("planForm").style.display="block";
                  document.getElementById("pf_edit_id").value=pl.id;
                  setTimeout(function(){
                    document.getElementById("pf_nome").value=pl.nome;
                    document.getElementById("pf_valor").value=pl.valor_mensal;
                    document.getElementById("pf_duracao").value=pl.duracao_meses;
                    document.getElementById("pf_desc").value=pl.descricao||"";
                    document.getElementById("pf_max_emp").value=pl.max_empreendimentos;
                    document.getElementById("pf_max_cor").value=pl.max_corretores;
                    document.getElementById("pf_destaque").checked=pl.destaque;
                    document.getElementById("pf_recursos").value=(pl.recursos||[]).join("\n");
                  },50);
                }} style={{padding:"8px 16px",borderRadius:8,background:B+"15",color:B,border:"none",fontSize:13,fontWeight:600}}>✏️ Editar</button>
                <button className="bh" onClick={async function(){if(!confirm("Desativar plano "+pl.nome+"?"))return;await sb.from("planos").update({ativo:false}).eq("id",pl.id);await loadAll();msg("Removido")}} style={{padding:"8px 16px",borderRadius:8,background:R+"15",color:R,border:"none",fontSize:13}}>🗑️</button>
              </div>
            </div>
          })}
        </div>
      </div>}

      {/* ═══ REPORTS ═══ */}
      {view==="reports"&&<div className="fade-in">
        <div style={{fontSize:24,fontWeight:700,color:"#fff",marginBottom:20}}>📈 Relatórios Financeiros</div>
        {/* Revenue summary */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:16}}>💰 Receita por Plano</div>
            {planos.map(function(pl){
              var cliPl=subs.filter(function(s){return s.plano_id===pl.id&&s.status==="ativo"}).length;
              var recPl=cliPl*pl.valor_mensal;
              var pct=mrr>0?Math.round(recPl/mrr*100):0;
              return <div key={pl.id} style={{marginBottom:10}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:4}}>
                  <span style={{color:"#aaa"}}>{pl.nome} ({cliPl})</span>
                  <span style={{fontWeight:600,color:GR}}>{fmt(recPl)}/m</span>
                </div>
                <div style={{height:6,borderRadius:3,background:"#1a1a1f",overflow:"hidden"}}>
                  <div style={{width:pct+"%",height:"100%",background:GR,borderRadius:3}}/>
                </div>
              </div>
            })}
            <div style={{borderTop:"1px solid #1a1a1f",paddingTop:10,marginTop:10,display:"flex",justifyContent:"space-between",fontSize:14}}>
              <span style={{fontWeight:600,color:"#fff"}}>Total MRR</span>
              <span style={{fontWeight:700,color:GR}}>{fmt(mrr)}</span>
            </div>
          </div>
          <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
            <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:16}}>📊 Métricas Chave</div>
            {[
              {l:"Lifetime Value (LTV)",v:fmt(mrr>0&&ativos.length>0?Math.round(mrr/ativos.length*12):0),c:GR},
              {l:"Custo Aquisição (CAC)",v:"A definir",c:"#555"},
              {l:"LTV/CAC Ratio",v:"—",c:B},
              {l:"Tempo médio de conversão",v:tenants.filter(function(t){return t.pipeline==="ativo"}).length>0?"~7 dias":"—",c:P},
              {l:"Taxa de conversão trial→ativo",v:trials.length+ativos.length>0?Math.round(ativos.length/(trials.length+ativos.length)*100)+"%":"—",c:G}
            ].map(function(m,i){return <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<4?"1px solid #15151a":"none",fontSize:13}}>
              <span style={{color:"#888"}}>{m.l}</span>
              <span style={{fontWeight:600,color:m.c}}>{m.v}</span>
            </div>})}
          </div>
        </div>
        {/* Payment status breakdown */}
        <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f",marginBottom:20}}>
          <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:16}}>💳 Status dos Pagamentos</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12}}>
            {(function(){
              var total=pagtos.reduce(function(s,p){return s+p.valor},0);
              var pago=pagtos.filter(function(p){return p.status==="pago"}).reduce(function(s,p){return s+p.valor},0);
              var pend=pagtos.filter(function(p){return p.status==="pendente"}).reduce(function(s,p){return s+p.valor},0);
              var atr=pendentes.reduce(function(s,p){return s+p.valor},0);
              return [{l:"Total gerado",v:fmt(total),c:"#fff"},{l:"Recebido",v:fmt(pago),c:GR},{l:"Pendente",v:fmt(pend),c:W},{l:"Atrasado",v:fmt(atr),c:R}].map(function(k,i){
                return <div key={i} style={{textAlign:"center",padding:12,borderRadius:10,background:k.c+"08"}}>
                  <div style={{fontSize:20,fontWeight:700,color:k.c}}>{k.v}</div>
                  <div style={{fontSize:11,color:"#555"}}>{k.l}</div>
                </div>
              })
            })()}
          </div>
          {/* Adimplência rate */}
          {(function(){
            var total=pagtos.length;var pagos=pagtos.filter(function(p){return p.status==="pago"}).length;
            var rate=total>0?Math.round(pagos/total*100):100;
            return <div style={{marginTop:16}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:13,marginBottom:6}}>
                <span style={{color:"#888"}}>Taxa de adimplência</span>
                <span style={{fontWeight:700,color:rate>=90?GR:rate>=70?W:R}}>{rate}%</span>
              </div>
              <div style={{height:8,borderRadius:4,background:"#1a1a1f",overflow:"hidden"}}>
                <div style={{width:rate+"%",height:"100%",background:rate>=90?GR:rate>=70?W:R,borderRadius:4,transition:"width .5s"}}/>
              </div>
            </div>
          })()}
        </div>
        {/* Top clients by revenue */}
        <div style={{padding:20,borderRadius:14,background:"#0f0f12",border:"1px solid #1a1a1f"}}>
          <div style={{fontSize:14,fontWeight:600,color:"#fff",marginBottom:12}}>🏆 Top Clientes por Receita</div>
          {tenants.filter(function(t){return t.valor_mensal>0}).sort(function(a,b){return(b.valor_mensal||0)-(a.valor_mensal||0)}).slice(0,10).map(function(t,i){
            var pgTotal=pagtos.filter(function(p){return p.tenant_id===t.id&&p.status==="pago"}).reduce(function(s,p){return s+p.valor},0);
            return <div key={t.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #15151a"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <span style={{fontSize:14,fontWeight:700,color:i<3?G:"#555",width:24}}>{i+1}.</span>
                <span style={{fontSize:14,color:"#fff"}}>{t.nome_empresa}</span>
              </div>
              <div style={{display:"flex",gap:16,alignItems:"center"}}>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:14,fontWeight:600,color:GR}}>{fmt(t.valor_mensal)}/m</div>
                  <div style={{fontSize:11,color:"#555"}}>Total pago: {fmt(pgTotal)}</div>
                </div>
              </div>
            </div>
          })}
        </div>
      </div>}

      {/* ═══ OVERDUE ═══ */}
      {view==="overdue"&&<div className="fade-in">
        <div style={{fontSize:24,fontWeight:700,color:"#fff",marginBottom:20}}>⚠️ Inadimplentes</div>
        {pendentes.length===0?<div style={{padding:40,textAlign:"center",color:GR,fontSize:16}}>✅ Nenhum pagamento atrasado!</div>:
        pendentes.map(function(p){var t=tenants.find(function(x){return x.id===p.tenant_id});var dias=Math.floor((Date.now()-new Date(p.vencimento).getTime())/86400000);
          return <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderRadius:12,background:"#0f0f12",border:"1px solid rgba(213,91,91,0.15)",marginBottom:6}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{t?t.nome_empresa:"—"}</div>
              <div style={{fontSize:12,color:R}}>Vencido há {dias} dia{dias!==1?"s":""} — {new Date(p.vencimento).toLocaleDateString("pt-BR")}</div>
              <div style={{fontSize:12,color:"#555"}}>{p.observacoes||""}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:700,color:R}}>{fmt(p.valor)}</div>
              <button className="bh" onClick={async function(){await sb.from("pagamentos").update({status:"pago",pago_em:new Date().toISOString().split("T")[0]}).eq("id",p.id);await loadAll();msg("✅ Pago!")}} style={{padding:"8px 16px",borderRadius:8,background:GR,color:"#fff",border:"none",fontSize:13,fontWeight:600}}>✅ Recebido</button>
            </div>
          </div>
        })}
      </div>}

    </div>

    {/* Toast */}
    {toast&&<div style={{position:"fixed",bottom:24,right:24,padding:"12px 24px",borderRadius:12,background:"#1a1a20",color:"#fff",fontSize:14,border:"1px solid #333",zIndex:999}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>

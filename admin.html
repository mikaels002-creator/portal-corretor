<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Portal do Corretor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#333;border-radius:3px}
body{background:#08080a;color:#E8E4DD;font-family:'DM Sans',system-ui,sans-serif;overflow-x:hidden}
body.light{background:#F5F2ED;color:#1a1a19}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.bh{transition:all .15s;cursor:pointer}
.bh:hover{opacity:.85;transform:translateY(-1px)}
input,select,textarea{font-family:inherit}
@media(max-width:768px){
  body{overflow-x:hidden!important}
  /* Sidebar becomes top bar on mobile */
  .admin-layout{flex-direction:column!important}
  .admin-sidebar{width:100%!important;flex-direction:row!important;padding:10px!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;gap:0!important;border-right:none!important;border-bottom:1px solid rgba(255,255,255,0.06)!important}
  .admin-sidebar>div:first-child{display:none!important} /* Hide header */
  .admin-sidebar>div:last-child{display:none!important} /* Hide user info */
  .admin-nav-items{display:flex!important;flex-direction:row!important;gap:2px!important;overflow-x:auto!important;width:100%!important;padding:0 4px!important}
  .admin-nav-items>div{white-space:nowrap!important;padding:8px 12px!important;font-size:12px!important;min-width:auto!important;border-radius:8px!important}
  /* Main content */
  .admin-main{padding:12px!important;max-height:none!important}
  /* Grids */
  [style*="gridTemplateColumns: 1fr 1fr 1fr"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(3"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(4"]{grid-template-columns:1fr 1fr!important}
  [style*="gridTemplateColumns: repeat(5"]{grid-template-columns:1fr!important}
  /* KPI cards */
  [style*="fontSize: 32"]{font-size:20px!important}
  [style*="fontSize: 28"]{font-size:18px!important}
  [style*="fontSize: 24"]{font-size:16px!important}
  /* Pipeline columns scroll */
  [style*="gridTemplateColumns: repeat(5"]{display:flex!important;overflow-x:auto!important;-webkit-overflow-scrolling:touch;gap:8px!important;padding-bottom:8px!important}
  [style*="gridTemplateColumns: repeat(5"]>div{min-width:200px!important;flex-shrink:0!important}
  /* Tables */
  table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
  /* Fix flex wrapping */
  [style*="display: flex"][style*="gap"]{flex-wrap:wrap!important}
  /* Integrations cards */
  [style*="gridTemplateColumns: 1fr 1fr"]{grid-template-columns:1fr!important}
  /* Landing editor */
  textarea{min-height:80px!important}
  /* Padding fixes */
  [style*="padding: 32px"]{padding:12px!important}
  [style*="padding: 24px 32px"]{padding:12px!important}
  [style*="padding: 20px"]{padding:12px!important}
}
@media(max-width:400px){
  .admin-nav-items>div{padding:6px 8px!important;font-size:11px!important}
  [style*="gridTemplateColumns: 1fr 1fr"]{grid-template-columns:1fr!important}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
var {useState,useEffect}=React;
var sb=supabase.createClient('https://zztqlktqevfdxjyzvand.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dHFsa3RxZXZmZHhqeXp2YW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI3NjMsImV4cCI6MjA5MTUwODc2M30.xl4LFZoPDR9q78-y9tcyLgaSSLb_oQFrcm2hjmnb-Mg');
var SUPABASE_URL='https://zztqlktqevfdxjyzvand.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp6dHFsa3RxZXZmZHhqeXp2YW5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI3NjMsImV4cCI6MjA5MTUwODc2M30.xl4LFZoPDR9q78-y9tcyLgaSSLb_oQFrcm2hjmnb-Mg';
var ADMIN_TID="mk"; // Tenant do admin SaaS — configurável
var fmt=function(v){return"R$ "+Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:0,maximumFractionDigits:0})};
var G="#C8A45C";var B="#5B8FD4";var GR="#4CAF7D";var P="#8B6FBF";var R="#D45B5B";var W="#E8A94E";


// ═══ AI BRAIN COMPONENT (standalone) ═══
  function AIBrainView(props){
    var tenants=props.tenants||[];var mrr=props.mrr||0;var ativos=props.ativos||[];var pendentes=props.pendentes||[];
    var dark=props.dark;var msg=props.msg;var cardBg=props.cardBg;var border=props.border;
    var textColor=props.textColor;var subColor=props.subColor;
    var _tab=useState("chat");var tab=_tab[0];var setTab=_tab[1];
    var _team=useState("brain");var team=_team[0];var setTeam=_team[1];
    var _msgs3=useState([]);var msgs3=_msgs3[0];var setMsgs3=_msgs3[1];
    var _inp=useState("");var inp=_inp[0];var setInp=_inp[1];
    var _busy=useState(false);var busy=_busy[0];var setBusy=_busy[1];
    var _history=useState([]);var history2=_history[0];var setHistory2=_history[1];
    var _apiKey=useState("");var apiKey=_apiKey[0];var setApiKey=_apiKey[1];
    var _aiModel=useState("claude-3-haiku-20240307");var aiModel=_aiModel[0];var setAiModel=_aiModel[1];
    var _goals=useState([]);var goals=_goals[0];var setGoals=_goals[1];
    var _aiTasks=useState([]);var aiTasks=_aiTasks[0];var setAiTasks=_aiTasks[1];
    var _aiContent=useState([]);var aiContent=_aiContent[0];var setAiContent=_aiContent[1];
    var _workerOn=useState(false);var workerOn=_workerOn[0];var setWorkerOn=_workerOn[1];
    var _workerLog=useState([]);var workerLog=_workerLog[0];var setWorkerLog=_workerLog[1];
    var _autonomy=useState({generate:true,approve:false,post:false});var autonomy=_autonomy[0];var setAutonomy=_autonomy[1];
    var _devMsgs=useState([]);var devMsgs=_devMsgs[0];var setDevMsgs=_devMsgs[1];
    var _devInp=useState("");var devInp=_devInp[0];var setDevInp=_devInp[1];
    var _devBusy=useState(false);var devBusy=_devBusy[0];var setDevBusy=_devBusy[1];
    var _devLog=useState([]);var devLog=_devLog[0];var setDevLog=_devLog[1];
    var _ghToken=useState("");var ghToken=_ghToken[0];var setGhToken=_ghToken[1];
    var _ghRepo=useState("portal-corretor");var ghRepo=_ghRepo[0];var setGhRepo=_ghRepo[1];
    var _ghUser=useState("");var ghUser=_ghUser[0];var setGhUser=_ghUser[1];
    var _aiProviders=useState({});var aiProviders=_aiProviders[0];var setAiProviders=_aiProviders[1];

    var loadBrainData=async function(){
      var r1=await sb.from("config_whatsapp").select("valor").eq("chave","anthropic_api_key").eq("tenant_id",ADMIN_TID).single();
      if(r1.data&&r1.data.valor){var kv=r1.data.valor;if(typeof kv==="object")kv=JSON.stringify(kv);kv=String(kv).replace(/^"|"$/g,"").replace(/^'/,"").replace(/'$/,"");if(kv.startsWith("sk-"))setApiKey(kv)}
      var rm=await sb.from("config_whatsapp").select("valor").eq("chave","ai_model").eq("tenant_id",ADMIN_TID).single();
      if(rm.data&&rm.data.valor){var mv=String(rm.data.valor).replace(/^"|"$/g,"");if(mv.startsWith("claude"))setAiModel(mv)}
      var r2=await sb.from("ai_goals").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false});setGoals(r2.data||[]);
      var r3=await sb.from("ai_tasks").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(50);setAiTasks(r3.data||[]);
      var r4=await sb.from("ai_content").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(30);setAiContent(r4.data||[]);
      var r5=await sb.from("ai_worker_log").select("*").eq("tenant_id",ADMIN_TID).order("criado_em",{ascending:false}).limit(10);setWorkerLog(r5.data||[]);
      var r6=await sb.from("config_whatsapp").select("valor").eq("chave","ai_worker_active").eq("tenant_id",ADMIN_TID).single();
      if(r6.data)setWorkerOn(r6.data.valor==="true"||r6.data.valor===true);
      var r7=await sb.from("config_whatsapp").select("valor").eq("chave","ai_autonomy").eq("tenant_id",ADMIN_TID).single();
      if(r7.data){try{setAutonomy(JSON.parse(r7.data.valor))}catch(e){}}
      var r8=await sb.from("config_whatsapp").select("chave,valor").in("chave",["github_token","github_user","github_repo"]).eq("tenant_id",ADMIN_TID);
      (r8.data||[]).forEach(function(c){var v=typeof c.valor==="string"?c.valor.replace(/^"|"$/g,""):String(c.valor);if(c.chave==="github_token")setGhToken(v);if(c.chave==="github_user")setGhUser(v);if(c.chave==="github_repo")setGhRepo(v)});
      var r9=await sb.from("config_whatsapp").select("chave,valor").like("chave","ai_provider_%").eq("tenant_id",ADMIN_TID);
      var r10=await sb.from("config_whatsapp").select("chave,valor").like("chave","ai_key_%").eq("tenant_id",ADMIN_TID);
      var provs={};
      (r9.data||[]).forEach(function(c){var cat=c.chave.replace("ai_provider_","");provs[cat]=provs[cat]||{};provs[cat].provider=(c.valor||"").replace(/^"|"$/g,"")});
      (r10.data||[]).forEach(function(c){var cat=c.chave.replace("ai_key_","");provs[cat]=provs[cat]||{};provs[cat].key=(c.valor||"").replace(/^"|"$/g,"")});
      setAiProviders(provs);
    };
    useEffect(function(){loadBrainData()},[]);

    var teams={
      brain:{name:"\ud83e\udde0 C\u00e9rebro",color:"#C8A45C",sys:"Voc\u00ea \u00e9 o C\u00c9REBRO CENTRAL do Portal do Corretor SaaS. Coordene 4 equipes (Marketing, Comercial, Financeiro, TI). Dados: "+tenants.length+" clientes, MRR R$"+mrr+", "+ativos.length+" ativos, "+pendentes.length+" pendentes. Responda em portugu\u00eas, estrat\u00e9gico e proativo. IMPORTANTE: quando sugerir tarefas, liste-as no formato TAREFA: [equipe] [tipo] [descri\u00e7\u00e3o] para que sejam adicionadas \u00e0 fila automaticamente."},
      mkt:{name:"\ud83d\udce3 Marketing",color:"#E06090",sys:"Voc\u00ea \u00e9 o AGENTE DE MARKETING. Crie conte\u00fado pronto para usar: posts Instagram/LinkedIn, emails, copies. Mercado: imobili\u00e1rio B2B. "+tenants.length+" clientes, "+ativos.length+" ativos. Quando gerar conte\u00fado, forne\u00e7a o texto COMPLETO pronto para copiar e postar. Responda em portugu\u00eas."},
      sales:{name:"\ud83d\udcbc Comercial",color:"#4CAF7D",sys:"Voc\u00ea \u00e9 o AGENTE COMERCIAL. Scripts de vendas, qualifica\u00e7\u00e3o, follow-up, propostas. Pipeline: "+tenants.filter(function(t){return t.pipeline==="lead"}).length+" leads, "+tenants.filter(function(t){return t.pipeline==="qualificado"}).length+" qualificados, "+tenants.filter(function(t){return t.pipeline==="trial"}).length+" trials. Responda em portugu\u00eas."},
      finance:{name:"\ud83d\udcb0 Financeiro",color:"#5B8FD4",sys:"Voc\u00ea \u00e9 o AGENTE FINANCEIRO. MRR R$"+mrr+", "+ativos.length+" ativos, "+pendentes.length+" pendentes (R$"+pendentes.reduce(function(s,p){return s+(p.valor||0)},0)+"). Responda em portugu\u00eas com n\u00fameros."},
      tech:{name:"\u26a1 TI",color:"#8B6FBF",sys:"Voc\u00ea \u00e9 o AGENTE DE TI. Stack: React/Babel, Supabase, WhatsApp Cloud API. Responda em portugu\u00eas com solu\u00e7\u00f5es t\u00e9cnicas."}
    };

    var callAI=async function(sys,messages){
      if(!apiKey)return"⚠️ API Key não configurada. Vá em Integrações → Anthropic API Key.";
      try{
        var r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},body:JSON.stringify({model:aiModel,max_tokens:1500,system:sys,messages:messages})});
        var d=await r.json();
        if(d.error)return"❌ Erro API: "+(d.error.message||JSON.stringify(d.error));
        return d.content?d.content.map(function(c2){return c2.text||""}).join(""):"Erro na resposta";
      }catch(e){return"❌ Erro de conexão: "+e.message}
    };

    var sendToAgent=async function(tk,q){
      if(!q||!q.trim()||busy)return;
      setBusy(true);var t2=teams[tk];
      var newMsgs=msgs3.concat([{role:"user",content:q,team:tk}]);
      setMsgs3(newMsgs);setInp("");

      // Handle special generation commands
      if(q.startsWith("GERAR_IMAGEM:")){
        var imgPrompt=q.replace("GERAR_IMAGEM:","").trim();
        setMsgs3(newMsgs.concat([{role:"assistant",content:"\ud83c\udfa8 Gerando imagem...\nPrompt: "+imgPrompt,team:tk}]));
        var imgResult=await generateImage(imgPrompt);
        if(imgResult.url){
          await sb.from("ai_content").insert({equipe:"mkt",tipo:"imagem",titulo:imgPrompt.substring(0,100),conteudo:"URL: "+imgResult.url+"\n\nPrompt: "+imgPrompt,plataforma:"instagram",status:"rascunho",tenant_id:ADMIN_TID});
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u2705 Imagem gerada!\n\n\ud83d\uddbc\ufe0f URL: "+imgResult.url+"\n\nSalva na aba Conte\u00fado como rascunho.",team:tk}]));
        }else{
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u274c "+(imgResult.error||"Erro ao gerar imagem"),team:tk}]));
        }
        setBusy(false);return;
      }
      if(q.startsWith("GERAR_VIDEO:")){
        var vidPrompt=q.replace("GERAR_VIDEO:","").trim();
        var vidResult=await generateVideo(vidPrompt);
        if(vidResult.error){
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u274c "+vidResult.error,team:tk}]));
        }else{
          await sb.from("ai_content").insert({equipe:"mkt",tipo:"video",titulo:vidPrompt.substring(0,100),conteudo:JSON.stringify(vidResult),plataforma:"instagram",status:"rascunho",tenant_id:ADMIN_TID});
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u2705 V\u00eddeo em processamento!\n\nID: "+(vidResult.id||vidResult.video_id||"enviado")+"\n\nSalvo na aba Conte\u00fado.",team:tk}]));
        }
        setBusy(false);return;
      }
      if(q.startsWith("GERAR_AUDIO:")){
        var audioText=q.replace("GERAR_AUDIO:","").trim();
        var audioResult=await generateVoice(audioText);
        if(audioResult.audio){
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u2705 \u00c1udio gerado!\n\n\ud83c\udf99\ufe0f Clique para ouvir. Texto: "+audioText,team:tk,audio:audioResult.audio}]));
        }else{
          setMsgs3(newMsgs.concat([{role:"assistant",content:"\u274c "+(audioResult.error||"Erro ao gerar \u00e1udio"),team:tk}]));
        }
        setBusy(false);return;
      }

      var apiMsgs=newMsgs.filter(function(m){return m.team===tk}).map(function(m){return{role:m.role,content:m.content}}).slice(-10);
      var txt=await callAI(t2.sys,apiMsgs);
      setMsgs3(newMsgs.concat([{role:"assistant",content:txt,team:tk}]));
      setHistory2(history2.concat([{team:tk,q:q.substring(0,100),ts:new Date().toLocaleString("pt-BR")}]));
      // Auto-extract tasks from brain responses
      if(tk==="brain"){var taskLines=txt.split("\n").filter(function(l){return l.includes("TAREFA:")});taskLines.forEach(function(l){
        var parts=l.replace("TAREFA:","").trim().split("]");
        if(parts.length>=2){var eq=parts[0].replace("[","").trim();var desc=parts.slice(1).join("]").replace("[","").replace("]","").trim();
          sb.from("ai_tasks").insert({equipe:eq.toLowerCase(),tipo:"auto",titulo:desc.substring(0,100),conteudo:desc,status:"pendente",prioridade:5,tenant_id:ADMIN_TID}).catch(function(){})
        }
      })}
      // Save content from mkt/sales
      if((tk==="mkt"||tk==="sales")&&txt.length>100){
        sb.from("ai_content").insert({equipe:tk,tipo:tk==="mkt"?"post":"script",titulo:q.substring(0,100),conteudo:txt,plataforma:tk==="mkt"?"instagram":"whatsapp",status:"rascunho",tenant_id:ADMIN_TID}).catch(function(){});
      }
      setBusy(false);
    };

    // WORKER - processes queue automatically
    var runWorker=async function(){
      if(!apiKey)return;
      await sb.from("ai_worker_log").insert({tipo:"worker_run",detalhes:"Worker executando...",tenant_id:ADMIN_TID});
      // 1. Check goals progress
      var gls=await sb.from("ai_goals").select("*").eq("status","ativo").eq("tenant_id",ADMIN_TID);
      var activeGoals=gls.data||[];
      // Update goal values
      for(var i=0;i<activeGoals.length;i++){
        var g=activeGoals[i];var newVal=0;
        if(g.tipo==="clientes")newVal=ativos.length;
        else if(g.tipo==="mrr")newVal=mrr;
        else if(g.tipo==="leads")newVal=tenants.filter(function(t){return t.pipeline==="lead"}).length;
        else if(g.tipo==="posts")newVal=(await sb.from("ai_content").select("id").eq("tipo","post").eq("tenant_id",ADMIN_TID)).data.length;
        else if(g.tipo==="emails")newVal=(await sb.from("ai_content").select("id").eq("tipo","email").eq("tenant_id",ADMIN_TID)).data.length;
        await sb.from("ai_goals").update({valor_atual:newVal}).eq("id",g.id);
      }
      // 2. Process pending tasks
      var pending2=await sb.from("ai_tasks").select("*").eq("status","pendente").eq("tenant_id",ADMIN_TID).order("prioridade").limit(3);
      var tasks2=pending2.data||[];
      for(var j=0;j<tasks2.length;j++){
        var task=tasks2[j];
        await sb.from("ai_tasks").update({status:"gerando"}).eq("id",task.id);
        var sys2=teams[task.equipe]?teams[task.equipe].sys:"Gere conte\u00fado profissional em portugu\u00eas.";
        var resultado=await callAI(sys2,[{role:"user",content:task.conteudo||task.titulo}]);
        await sb.from("ai_tasks").update({status:"pronto",resultado:resultado,gerado_em:new Date().toISOString()}).eq("id",task.id);
        await sb.from("ai_content").insert({equipe:task.equipe,tipo:task.tipo,titulo:task.titulo,conteudo:resultado,status:"rascunho",task_id:task.id,tenant_id:ADMIN_TID});
      }
      // 3. Auto-generate tasks if goals behind
      for(var k=0;k<activeGoals.length;k++){
        var gl=activeGoals[k];var pct=gl.meta_valor>0?gl.valor_atual/gl.meta_valor:1;
        if(pct<0.8){
          var pendingTasks=await sb.from("ai_tasks").select("id").eq("status","pendente").eq("tenant_id",ADMIN_TID);
          if((pendingTasks.data||[]).length<5){
            if(gl.tipo==="posts"||gl.tipo==="leads"){
              await sb.from("ai_tasks").insert({equipe:"mkt",tipo:"post_instagram",titulo:"Post Instagram - atingir meta de "+gl.tipo,conteudo:"Crie 1 post completo para Instagram do Portal do Corretor. Legenda persuasiva + 10 hashtags. Foco: atrair construtoras. Meta: "+gl.meta_valor+" "+gl.tipo+", atual: "+gl.valor_atual,status:"pendente",prioridade:3,meta_id:gl.id,tenant_id:ADMIN_TID});
            }
            if(gl.tipo==="clientes"||gl.tipo==="mrr"){
              await sb.from("ai_tasks").insert({equipe:"sales",tipo:"email_prospeccao",titulo:"Email prospec\u00e7\u00e3o - meta "+gl.tipo,conteudo:"Crie 1 email de prospec\u00e7\u00e3o fria para construtoras. Mostre ROI do Portal do Corretor. Tom consultivo. Meta: "+gl.meta_valor+" "+gl.tipo+", atual: "+gl.valor_atual,status:"pendente",prioridade:2,meta_id:gl.id,tenant_id:ADMIN_TID});
            }
          }
        }
      }
      await sb.from("ai_worker_log").insert({tipo:"worker_done",detalhes:"Processou "+tasks2.length+" tarefas. "+activeGoals.length+" metas ativas.",tenant_id:ADMIN_TID});
      await loadBrainData();
      msg("\u2705 Worker executou: "+tasks2.length+" tarefas processadas");
    };

    // Auto-worker interval
    useEffect(function(){
      if(!workerOn||!apiKey)return;
      var iv=setInterval(function(){runWorker()},1800000); // 30 min
      return function(){clearInterval(iv)};
    },[workerOn,apiKey]);

    var qActions=[
      {l:"\ud83d\udcca An\u00e1lise completa",team:"brain",q:"An\u00e1lise completa: sa\u00fade financeira, pipeline, metas, plano de a\u00e7\u00e3o. Liste TAREFA: [equipe] [descri\u00e7\u00e3o] para cada a\u00e7\u00e3o."},
      {l:"\ud83d\udcdd 3 Posts Instagram",team:"mkt",q:"Crie 3 posts Instagram para atrair construtoras. Legenda completa + hashtags."},
      {l:"\ud83d\udce7 Email prospec\u00e7\u00e3o",team:"sales",q:"Email de prospec\u00e7\u00e3o fria para construtoras. Tom consultivo, ROI claro."},

        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>📸</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Instagram Business API</div><div style={{fontSize:12,color:subColor}}>Postagem automática via Cérebro IA</div></div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Instagram User ID</div><input id="int_ig_user" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="ID da conta Business"/></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Facebook Page ID</div><input id="int_ig_page" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="ID da página vinculada"/></div>
          </div>
          <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Token de Acesso (Long-lived)</div><input id="int_ig_token" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Token permanente do Facebook/Instagram"/></div>
          <div style={{padding:10,borderRadius:8,background:dark?"#111":"#f8f5f0",marginBottom:10,fontSize:12,color:subColor,lineHeight:1.8}}>
            <b>Como obter:</b> Facebook Developer Console → Seu App → Instagram Graph API<br/>
            1. Crie um App no developers.facebook.com<br/>
            2. Adicione o produto "Instagram Graph API"<br/>
            3. Vincule sua conta Business do Instagram<br/>
            4. Gere um Long-Lived Token (60 dias)
          </div>
          <button className="bh" onClick={async function(){
            var cfgs=[{k:"ig_user_id",v:document.getElementById("int_ig_user").value},{k:"ig_page_id",v:document.getElementById("int_ig_page").value}];
            var tk=document.getElementById("int_ig_token").value;if(tk)cfgs.push({k:"ig_access_token",v:tk});
            for(var i=0;i<cfgs.length;i++){if(cfgs[i].v){await sb.from("config_whatsapp").delete().eq("chave",cfgs[i].k).eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:cfgs[i].k,valor:cfgs[i].v,tenant_id:ADMIN_TID})}}
            msg("✅ Instagram Business configurado!")
          }} style={{padding:"10px 20px",borderRadius:8,background:"linear-gradient(135deg,#E06090,#C13584)",color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar Instagram</button>
        </div>

        {/* Payment gateway */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>💳</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Gateway de Pagamento</div><div style={{fontSize:12,color:subColor}}>Cobrança automática: PIX, cartão, boleto</div></div>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Plataforma</div>
              <select id="int_pay_plat" style={iS}><option value="">Selecione...</option><option value="asaas">Asaas</option><option value="stripe">Stripe</option><option value="mercadopago">Mercado Pago</option><option value="pagarme">Pagar.me</option><option value="gerencianet">Gerencianet/EFÍ</option></select></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>API Key</div><input id="int_pay_key" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Chave da API"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Chave PIX (para cobranças)</div><input id="int_pix_key" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="email@empresa.com ou CNPJ"/></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Ambiente</div>
              <select id="int_pay_env" style={iS}><option value="sandbox">🧪 Sandbox</option><option value="production">🟢 Produção</option></select></div>
          </div>
          <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Webhook (confirmações automáticas)</div><input style={Object.assign({},iS,{color:subColor,fontSize:11})} readOnly value="https://zztqlktqevfdxjyzvand.supabase.co/functions/v1/webhook-pagamento"/></div>
          <div style={{padding:12,borderRadius:10,background:dark?"#111":"#f8f5f0",border:"1px solid "+border,marginTop:10,marginBottom:10}}>
            <div style={{fontSize:13,fontWeight:600,color:textColor,marginBottom:8}}>⚡ Cobranças automáticas</div>
            <div style={{fontSize:12,color:subColor,lineHeight:1.8}}>
              ✅ <b>Landing Page:</b> Lead se cadastra → Escolhe plano → Paga PIX/Cartão → Assinatura criada automaticamente<br/>
              ✅ <b>Instagram:</b> Link na bio → Checkout → Pagamento → Portal ativado<br/>
              ✅ <b>Upgrade pelo cliente:</b> Escolhe plano → PIX (5% desc) ou Cartão → Parcelas atualizadas<br/>
              ✅ <b>Recorrência:</b> Cartão cobra automaticamente todo mês. PIX gera QR mensal.
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("int_pay_plat").value;var key=document.getElementById("int_pay_key").value;var pix=document.getElementById("int_pix_key").value;var env=document.getElementById("int_pay_env").value;
              if(!plat){msg("Selecione uma plataforma");return}
              var cfgs=[{k:"payment_platform",v:plat},{k:"payment_env",v:env}];
              if(key)cfgs.push({k:"payment_api_key",v:key});
              if(pix)cfgs.push({k:"pix_key",v:pix});
              for(var i=0;i<cfgs.length;i++){await sb.from("config_whatsapp").delete().eq("chave",cfgs[i].k).eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:cfgs[i].k,valor:cfgs[i].v,tenant_id:ADMIN_TID})}
              msg("✅ Gateway configurado: "+plat)
            }} style={{flex:1,padding:"10px 20px",borderRadius:8,background:GR,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar Gateway</button>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("int_pay_plat").value;var key=document.getElementById("int_pay_key").value;
              if(!plat||!key){msg("Configure primeiro");return}
              msg("🔍 Testando conexão com "+plat+"...");
              try{
                var urls={asaas:"https://sandbox.asaas.com/api/v3/finance/balance",stripe:"https://api.stripe.com/v1/balance",mercadopago:"https://api.mercadopago.com/v1/payment_methods",pagarme:"https://api.pagar.me/core/v5/recipients",gerencianet:"https://sandbox.gerencianet.com.br/v1/authorize"};
                msg("✅ "+plat+" configurado! Integração pronta para cobranças.");
              }catch(e){msg("❌ Erro: "+e.message)}
            }} style={{padding:"10px 20px",borderRadius:8,background:dark?"#111":"#f8f5f0",color:subColor,border:"1px solid "+border,fontSize:13,cursor:"pointer"}}>🔍 Testar</button>
          </div>
        </div>
        {/* Instagram */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:12}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>📸</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Instagram API</div><div style={{fontSize:12,color:subColor}}>Publicação automática, stories, métricas</div></div>
            </div>
            <span style={{fontSize:11,padding:"4px 12px",borderRadius:8,background:subColor+"15",color:subColor,fontWeight:600}}>Em breve</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Instagram Username</div><input id="int_ig_user" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="@suaempresa"/></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Access Token</div><input id="int_ig_token" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Token Meta Graph API"/></div>
          </div>
          <button className="bh" onClick={async function(){
            var usr=document.getElementById("int_ig_user").value;var tk=document.getElementById("int_ig_token").value;
            if(usr){await sb.from("config_whatsapp").delete().eq("chave","instagram_user");await sb.from("config_whatsapp").insert({chave:"instagram_user",valor:usr,tenant_id:ADMIN_TID})}
            if(tk){await sb.from("config_whatsapp").delete().eq("chave","instagram_token");await sb.from("config_whatsapp").insert({chave:"instagram_token",valor:tk,tenant_id:ADMIN_TID})}
            msg("✅ Instagram salvo!")
          }} style={{padding:"10px 20px",borderRadius:8,background:P,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
        </div>
        {/* Email */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:28}}>📧</span>
              <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>Email Marketing</div><div style={{fontSize:12,color:subColor}}>Envio automático, templates, sequências</div></div>
            </div>
            <span style={{fontSize:11,padding:"4px 12px",borderRadius:8,background:subColor+"15",color:subColor,fontWeight:600}}>Em breve</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Plataforma</div>
              <select id="int_email_plat" style={iS}><option value="">Selecione...</option><option value="mailchimp">Mailchimp</option><option value="sendgrid">SendGrid</option><option value="resend">Resend</option><option value="brevo">Brevo</option></select></div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>API Key</div><input id="int_email_key" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="API Key"/></div>
          </div>
          <button className="bh" onClick={async function(){
            var plat=document.getElementById("int_email_plat").value;var key=document.getElementById("int_email_key").value;
            if(plat){await sb.from("config_whatsapp").delete().eq("chave","email_platform");await sb.from("config_whatsapp").insert({chave:"email_platform",valor:plat,tenant_id:ADMIN_TID})}
            if(key){await sb.from("config_whatsapp").delete().eq("chave","email_api_key");await sb.from("config_whatsapp").insert({chave:"email_api_key",valor:key,tenant_id:ADMIN_TID})}
            msg("✅ Email salvo!")
          }} style={{padding:"10px 20px",borderRadius:8,background:B,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
        </div>

        {/* Signing Integration */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border,marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>✍️ Assinatura Digital</div><div style={{fontSize:12,color:subColor}}>ClickSign, DocuSign, D4Sign ou Autentique</div></div>
            <span style={{fontSize:10,padding:"4px 10px",borderRadius:6,background:P+"12",color:P,fontWeight:600}}>Propostas</span>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Plataforma</div>
              <select id="sign_platform" style={iS}><option value="">Selecione...</option><option value="clicksign">ClickSign</option><option value="docusign">DocuSign</option><option value="d4sign">D4Sign</option><option value="autentique">Autentique</option></select>
            </div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>API Token</div><input id="sign_token" type="password" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="Token de acesso da API"/></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:8}}>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Ambiente</div>
              <select id="sign_env" style={iS}><option value="sandbox">🧪 Sandbox (teste)</option><option value="production">🟢 Produção</option></select>
            </div>
            <div><div style={{fontSize:11,color:subColor,marginBottom:3}}>Webhook URL (opcional)</div><input id="sign_webhook" onKeyDown={function(e){e.stopPropagation()}} style={iS} placeholder="https://..." disabled/></div>
          </div>
          <div style={{padding:10,borderRadius:8,background:dark?"#111":"#f8f5f0",marginTop:10,fontSize:12,color:subColor}}>
            📋 <b>Fluxo:</b> Proposta aceita → Gera documento → Envia para assinatura (cliente + corretor + construtora) → Status acompanhado no portal → Documento assinado salvo automaticamente
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("sign_platform").value;var tok=document.getElementById("sign_token").value;var env=document.getElementById("sign_env").value;
              if(!plat||!tok){msg("Selecione plataforma e informe o token");return}
              var configs=[{k:"sign_platform",v:plat},{k:"sign_token",v:tok},{k:"sign_env",v:env}];
              for(var i=0;i<configs.length;i++){await sb.from("config_whatsapp").delete().eq("chave",configs[i].k).eq("tenant_id",ADMIN_TID);await sb.from("config_whatsapp").insert({chave:configs[i].k,valor:configs[i].v,tenant_id:ADMIN_TID})}
              msg("✅ Assinatura digital configurada!")
            }} style={{flex:1,padding:"10px 20px",borderRadius:8,background:P,color:"#fff",border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>💾 Salvar</button>
            <button className="bh" onClick={async function(){
              var plat=document.getElementById("sign_platform").value;var tok=document.getElementById("sign_token").value;
              if(!plat||!tok){msg("Configure primeiro");return}
              var urls={clicksign:"https://app.clicksign.com/api/v1/documents?access_token="+tok,docusign:"https://demo.docusign.net/restapi/v2.1/accounts",d4sign:"https://sandbox.d4sign.com.br/api/v1/documents?tokenAPI="+tok,autentique:"https://api.autentique.com.br/v2/graphql"};
              try{var r=await fetch(urls[plat]||"",{method:"GET",headers:{"Content-Type":"application/json"}});msg(r.ok?"✅ Conexão OK!":"❌ Erro: "+r.status)}catch(e){msg("❌ "+e.message)}
            }} style={{padding:"10px 20px",borderRadius:8,background:dark?"#111":"#f8f5f0",color:subColor,border:"1px solid "+border,fontSize:13,cursor:"pointer"}}>🔍 Testar</button>
          </div>
        </div>

        {/* Document Repository */}
        <div style={{padding:20,borderRadius:14,background:cardBg,border:"1px solid "+border}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <div><div style={{fontSize:16,fontWeight:700,color:textColor}}>📁 Repositório de Documentos</div><div style={{fontSize:12,color:subColor}}>Templates para envio de assinatura</div></div>
            <button className="bh" onClick={async function(){
              var nome=prompt("Nome do template (ex: Contrato de Compra e Venda):");if(!nome)return;
              var desc=prompt("Descrição curta:");
              await sb.from("config_whatsapp").insert({chave:"doc_template_"+Date.now(),valor:JSON.stringify({nome:nome,descricao:desc||"",tipo:"contrato",ativo:true,criado_em:new Date().toISOString()}),tenant_id:ADMIN_TID});
              msg("✅ Template adicionado!");
            }} style={{padding:"8px 16px",borderRadius:8,background:P+"12",color:P,border:"none",fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Template</button>
          </div>
          <div style={{fontSize:12,color:subColor,padding:12,borderRadius:8,background:dark?"#111":"#f8f5f0"}}>
            📄 Configure templates de documentos para envio automático nas propostas. Cada template pode ser enviado via ClickSign/DocuSign quando a proposta é aceita.
            <br/><br/>
            <b>Tipos sugeridos:</b> Contrato de Compra e Venda, Termo de Aceite, NDA, Proposta Comercial, Procuração
          </div>
        </div>
      </div>}

      {/* ═══ OVERDUE ═══ */}
      {view==="overdue"&&<div className="fade-in">
        <div style={{fontSize:24,fontWeight:700,color:textColor,marginBottom:20}}>⚠️ Inadimplentes</div>
        {pendentes.length===0?<div style={{padding:40,textAlign:"center",color:GR,fontSize:16}}>✅ Nenhum pagamento atrasado!</div>:
        pendentes.map(function(p){var t=tenants.find(function(x){return x.id===p.tenant_id});var dias=Math.floor((Date.now()-new Date(p.vencimento).getTime())/86400000);
          return <div key={p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 16px",borderRadius:12,background:cardBg,border:"1px solid rgba(213,91,91,0.15)",marginBottom:6}}>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:textColor}}>{t?t.nome_empresa:"—"}</div>
              <div style={{fontSize:12,color:R}}>Vencido há {dias} dia{dias!==1?"s":""} — {new Date(p.vencimento).toLocaleDateString("pt-BR")}</div>
              <div style={{fontSize:12,color:subColor}}>{p.observacoes||""}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontSize:22,fontWeight:700,color:R}}>{fmt(p.valor)}</div>
              <button className="bh" onClick={async function(){await sb.from("pagamentos").update({status:"pago",pago_em:new Date().toISOString().split("T")[0]}).eq("id",p.id);await loadAll();msg("✅ Pago!")}} style={{padding:"8px 16px",borderRadius:8,background:GR,color:textColor,border:"none",fontSize:13,fontWeight:600}}>✅ Recebido</button>
            </div>
          </div>
        })}
      </div>}

    </div>

    {/* Toast */}
    {toast&&<div style={{position:"fixed",bottom:24,right:24,padding:"12px 24px",borderRadius:12,background:cardBg,color:textColor,fontSize:14,border:"1px solid "+border,zIndex:999}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
